<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#fff;color:#0a0a0a;font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column}
#feed{flex:1;overflow-y:auto;padding:0 20px 20px;overscroll-behavior:contain}
#feed::-webkit-scrollbar{width:4px}
#feed::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px}
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;text-align:center;padding:0 20px 100px;transition:all 0.5s cubic-bezier(.4,0,.2,1)}
#welcome.out{opacity:0;transform:scale(0.98);pointer-events:none;position:absolute}
.w-dot{width:6px;height:6px;border-radius:50%;background:#0a0a0a;margin-bottom:32px;opacity:0;animation:dotIn 0.4s ease 0.2s forwards}
@keyframes dotIn{to{opacity:1}}
.w-title{font-size:clamp(22px,4vw,36px);font-weight:300;line-height:1.4;letter-spacing:-0.02em;max-width:480px;color:#0a0a0a}
.w-title strong{font-weight:600}
.w-cursor{display:inline-block;width:1.5px;height:0.95em;background:#0a0a0a;margin-left:1px;vertical-align:text-bottom;animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
#conv{max-width:680px;margin:0 auto;width:100%}
.msg-user{display:flex;justify-content:flex-end;margin-bottom:8px;opacity:0;transform:translateY(8px);animation:fadeUp 0.3s ease forwards}
.msg-user-text{font-size:14px;color:#fff;background:#0a0a0a;padding:10px 18px;border-radius:20px 20px 4px 20px;max-width:80%;line-height:1.5}
.msg-res{margin:16px 0 32px;opacity:0;transform:translateY(12px);animation:fadeUp 0.4s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.typing{display:flex;gap:5px;padding:16px 0;align-items:center}
.typing i{width:5px;height:5px;border-radius:50%;background:#bbb;display:block;animation:pulse 1s ease infinite}
.typing i:nth-child(2){animation-delay:0.15s}
.typing i:nth-child(3){animation-delay:0.3s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.85)}40%{opacity:1;transform:scale(1)}}
.rh{font-family:'JetBrains Mono',monospace;font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px}
.rt{font-size:clamp(20px,3vw,30px);font-weight:700;letter-spacing:-0.025em;line-height:1.2;margin-bottom:14px}
.rs{font-size:14px;color:#666;line-height:1.8;margin-bottom:14px}
.rs:last-child{margin-bottom:0}
.rs strong{color:#0a0a0a;font-weight:600}
.rq{font-size:15px;color:#0a0a0a;line-height:1.7;border-left:2px solid #0a0a0a;padding:2px 0 2px 18px;margin:20px 0}
.stats{display:flex;gap:28px;flex-wrap:wrap;padding:18px 0;margin:16px 0;border-top:1px solid #eee;border-bottom:1px solid #eee}
.st-v{font-family:'JetBrains Mono',monospace;font-size:clamp(22px,3vw,32px);font-weight:700;line-height:1}
.st-l{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}
.pc{border:1px solid #eee;margin-bottom:12px;transition:border-color 0.15s}
.pc:hover{border-color:#ccc}
.pc-h{padding:20px 22px;display:flex;justify-content:space-between;align-items:start;gap:16px}
.pc-n{font-size:clamp(17px,2.2vw,22px);font-weight:700;letter-spacing:-0.02em;line-height:1.2}
.pc-t{font-family:'JetBrains Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;padding-top:3px}
.pc-b{padding:0 22px 20px}
.pc-d{font-size:13px;color:#666;line-height:1.75}
.pc-m{display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid #eee}
.pc-mv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;display:block}
.pc-ml{font-family:'JetBrains Mono',monospace;font-size:9px;color:#999;text-transform:uppercase;letter-spacing:0.06em}
.pc-a{display:inline-block;margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#0a0a0a;font-weight:500;text-decoration:none;letter-spacing:0.04em;padding:6px 14px;border:1px solid #eee;transition:all 0.15s}
.pc-a:hover{background:#0a0a0a;color:#fff}
.sg{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.stag{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px;border:1px solid #eee;color:#666;transition:all 0.15s}
.stag:hover{border-color:#0a0a0a;color:#0a0a0a}
.ss{margin-bottom:20px}
.ss-l{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px}
.tl{display:grid;grid-template-columns:72px 1fr;gap:16px;padding:16px 0;border-bottom:1px solid #eee}
.tl:first-of-type{border-top:1px solid #eee}
.tl-y{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:#999;padding-top:2px}
.tl-y.now{background:#0a0a0a;color:#fff;padding:3px 0;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:0.1em}
.tl-t{font-size:13px;color:#666;line-height:1.7}
.tl-t strong{color:#0a0a0a}
.cc{text-align:center;padding:28px 0}
.cc h2{font-size:clamp(22px,3vw,32px);font-weight:700;letter-spacing:-0.02em;margin-bottom:12px}
.cc-btn{display:inline-block;padding:12px 36px;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;text-decoration:none;letter-spacing:0.02em;transition:opacity 0.15s}
.cc-btn:hover{opacity:0.8}
.cc-lk{margin-top:20px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.cc-lk a{font-family:'JetBrains Mono',monospace;font-size:11px;color:#999;text-decoration:none;transition:color 0.15s}
.cc-lk a:hover{color:#0a0a0a}
.cmp{display:grid;grid-template-columns:1fr 1fr;border:1px solid #eee;margin:16px 0}
.cmp-c{padding:20px}
.cmp-c:first-child{border-right:1px solid #eee}
.cmp-h{font-family:'JetBrains Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #eee}
.cmp-i{font-size:13px;color:#666;line-height:2}
#bar{background:#fff;padding:8px 20px max(16px, env(safe-area-inset-bottom));border-top:1px solid #eee;flex-shrink:0}
#sug{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;min-height:30px}
.chip{font-family:'Inter',sans-serif;font-size:12px;color:#888;padding:6px 14px;border:1px solid #eee;border-radius:18px;background:#fff;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.chip:hover{border-color:#0a0a0a;color:#0a0a0a}
#irow{display:flex;gap:10px;max-width:560px;margin:0 auto}
#inp{flex:1;font-family:'Inter',sans-serif;font-size:14px;padding:10px 18px;border:1px solid #eee;border-radius:24px;background:#fafafa;color:#0a0a0a;outline:none;transition:border-color 0.2s}
#inp:focus{border-color:#ccc}
#inp::placeholder{color:#bbb}
#snd{width:40px;height:40px;border:none;border-radius:50%;background:#0a0a0a;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity 0.15s;flex-shrink:0}
#snd:hover{opacity:0.8}
#snd svg{width:16px;height:16px}
@media(max-width:640px){
#feed{padding:0 14px 14px}
#bar{padding:6px 14px max(12px,env(safe-area-inset-bottom))}
.chip{font-size:11px;padding:5px 11px}
.pc-h{flex-direction:column;gap:4px;padding:16px}
.pc-b{padding:0 16px 16px}
.pc-m{gap:12px}
.cmp{grid-template-columns:1fr}
.cmp-c:first-child{border-right:none;border-bottom:1px solid #eee}
.tl{grid-template-columns:56px 1fr;gap:10px}
.stats{gap:18px}
.msg-user-text{max-width:90%}
}
</style>

<script>
let lang="en";
const FR_W=["qui","est","quoi","comment","montre","projets","parcours","contact","parle","raconte","explique","dit","age","entrepren","compet","detail","bonjour","salut","moi","son","ses","les","des","une","pour","dans","avec","sur","aussi","tout","mais","plus","que","quel","cette","faire","voir","savoir","peut","sont","fait","entre","comme","autre","depuis","pourquoi","où","quand","combien","encore","trop","bien","rien","jamais","toujours","chez","vers","après","avant"];
function detectLang(t){const w=t.toLowerCase().split(/\s+/);let f=0;for(const x of w){if(FR_W.some(v=>x.includes(v)))f++}lang=f>=1?"fr":"en";return lang}

const R={

who:{en:{q:"Who is Nicolas?",h:`<div style="margin-bottom:24px"><div class="rt" style="font-size:clamp(26px,4vw,38px)">Nicolas PHILIPPE</div><p class="rs" style="font-size:15px;max-width:500px">19 years old. French. Self-taught since 16. Founder of <strong>20n Research Laboratory</strong> — building the universal brain for robots from Paris.</p></div><div class="stats"><div><div class="st-v">19</div><div class="st-l">Age</div></div><div><div class="st-v">3 yrs</div><div class="st-l">Self-taught</div></div><div><div class="st-v">8+</div><div class="st-l">Projects</div></div><div><div class="st-v">Paris</div><div class="st-l">Based in</div></div></div><p class="rs">Started coding at 16 with Python and trading bots. No CS degree, no bootcamp — just obsessive curiosity. Went from selling websites to local businesses in Alsace to building a <strong>biomimetic brain architecture grounded in theoretical neuroscience</strong>.</p><p class="rs">His work at 20n is now attracting attention from <strong>J12 Ventures, Plug and Play, and MIT professors</strong>. Winner of Innov Hack Paris 2026 among 150 participants.</p><p class="rs">Speaks <strong>French</strong> (native), <strong>English</strong> (B2), and <strong>German</strong> (B1). Not a student — a builder.</p>`,n:["Tell me about 20n","His full journey","All projects","Contact"]},fr:{q:"Qui est Nicolas ?",h:`<div style="margin-bottom:24px"><div class="rt" style="font-size:clamp(26px,4vw,38px)">Nicolas PHILIPPE</div><p class="rs" style="font-size:15px;max-width:500px">19 ans. Français. Autodidacte depuis 16 ans. Fondateur de <strong>20n Research Laboratory</strong> — construit le cerveau universel pour robots depuis Paris.</p></div><div class="stats"><div><div class="st-v">19</div><div class="st-l">Âge</div></div><div><div class="st-v">3 ans</div><div class="st-l">Autodidacte</div></div><div><div class="st-v">8+</div><div class="st-l">Projets</div></div><div><div class="st-v">Paris</div><div class="st-l">Basé à</div></div></div><p class="rs">A commencé à coder à 16 ans avec Python et des bots de trading. Pas de diplôme, pas de bootcamp — juste une curiosité obsessionnelle. Passé de la vente de sites web pour PME en Alsace à la construction d'une <strong>architecture cérébrale biomimétique fondée sur les neurosciences théoriques</strong>.</p><p class="rs">Son travail chez 20n attire désormais l'attention de <strong>J12 Ventures, Plug and Play et des professeurs du MIT</strong>. Vainqueur du Innov Hack Paris 2026 parmi 150 participants.</p><p class="rs">Parle <strong>français</strong> (natif), <strong>anglais</strong> (B2) et <strong>allemand</strong> (B1). Pas étudiant — builder.</p>`,n:["Parle-moi de 20n","Son parcours complet","Tous les projets","Contact"]}},

"20n":{en:{q:"What is 20n?",h:`<div class="rh">Current focus — since January 2026</div><div class="rt">20n Research Laboratory</div><p class="rs">A universal artificial brain for humanoid robots. One architecture, grounded in theoretical neuroscience, that can control <strong>any robot body</strong>. No training, no cloud, no GPU. 20 watts.</p><div class="pc-m" style="border-top:1px solid #eee;padding-top:16px;margin:16px 0 20px"><div><div class="pc-mv">20W</div><div class="pc-ml">Power</div></div><div><div class="pc-mv">0</div><div class="pc-ml">Training steps</div></div><div><div class="pc-mv">1kHz</div><div class="pc-ml">Inference</div></div><div><div class="pc-mv">3</div><div class="pc-ml">Bodies tested</div></div></div><p class="rs">The architecture is <strong>biomimetic and hierarchical</strong> — modeled after the biological brain. Five layers working together:</p><p class="rs"><strong>Spinal Cord</strong> (1kHz) — hardwired reflexes and posture. <strong>Cerebellum</strong> (100Hz) — internal body model via forward simulation. <strong>Cortex</strong> (10Hz) — world model, learns online by minimizing prediction error. <strong>Hippocampus</strong> — episodic memory, retrieves by similarity. <strong>Basal Ganglia</strong> — action selection, chooses safest trajectory.</p><p class="rs">All unified by <strong>Active Inference</strong> (Karl Friston, 2010) — the Free Energy Principle. The brain predicts, acts, corrects. Continuously. No backpropagation. No training phase.</p><div class="rq">Drop it into a humanoid and it discovers how to balance. A quadruped and it learns to move. A body with 17 joints that has never existed in nature — and it figures it out. No retraining. The same brain.</div><p class="rs">Benchmarked on MuJoCo: <strong>Walker2d (max 1000), Ant (max 1000), Humanoid (474 and improving)</strong>.</p><a href="https://20n.dev" class="pc-a" target="_blank" rel="noopener">20n.dev →</a>`,n:["Show me results","How does it compare?","Technical details"]},fr:{q:"C'est quoi 20n ?",h:`<div class="rh">Focus actuel — depuis janvier 2026</div><div class="rt">20n Research Laboratory</div><p class="rs">Un cerveau artificiel universel pour robots humanoïdes. Une seule architecture, fondée sur les neurosciences théoriques, capable de contrôler <strong>n'importe quel corps robotique</strong>. Pas d'entraînement, pas de cloud, pas de GPU. 20 watts.</p><div class="pc-m" style="border-top:1px solid #eee;padding-top:16px;margin:16px 0 20px"><div><div class="pc-mv">20W</div><div class="pc-ml">Puissance</div></div><div><div class="pc-mv">0</div><div class="pc-ml">Entraînement</div></div><div><div class="pc-mv">1kHz</div><div class="pc-ml">Inférence</div></div><div><div class="pc-mv">3</div><div class="pc-ml">Corps testés</div></div></div><p class="rs">L'architecture est <strong>biomimétique et hiérarchique</strong> — modelée sur le cerveau biologique. Cinq couches :</p><p class="rs"><strong>Moelle épinière</strong> (1kHz) — réflexes. <strong>Cervelet</strong> (100Hz) — modèle corporel interne. <strong>Cortex</strong> (10Hz) — modèle du monde, apprend en temps réel. <strong>Hippocampe</strong> — mémoire épisodique. <strong>Ganglions de la base</strong> — sélection d'action.</p><p class="rs">Le tout unifié par l'<strong>Active Inference</strong> (Karl Friston, 2010). Le cerveau prédit, agit, corrige. En continu. Zéro backpropagation.</p><div class="rq">Placez-le dans un humanoïde et il découvre comment tenir debout. Un quadrupède et il apprend à se déplacer. Le même cerveau, zéro réentraînement.</div><p class="rs">Benchmarké sur MuJoCo : <strong>Walker2d (max 1000), Ant (max 1000), Humanoid (474, en progrès)</strong>.</p><a href="https://20n.dev" class="pc-a" target="_blank" rel="noopener">20n.dev →</a>`,n:["Résultats","Comparaison industrie","Détails techniques"]}},

"20n_tech":{en:{q:"20n — Technical Architecture",h:`<div class="rh">Deep dive</div><div class="rt">Five layers. One brain.</div><p class="rs">The 20n architecture is modeled after the <strong>biological brain</strong>. Each layer operates at a different frequency, handling different aspects of intelligence:</p><div class="tl"><div class="tl-y">1kHz</div><div class="tl-t"><strong>Spinal Cord</strong> — Hardwired reflexes and posture control. PD controllers for joint stability. The fastest loop — reacts before the brain even "thinks." Like pulling your hand from a flame.</div></div><div class="tl"><div class="tl-y">100Hz</div><div class="tl-t"><strong>Cerebellum</strong> — Internal body model via forward simulation. Predicts where joints will be 10ms from now using <strong>CfC (Closed-form Continuous-depth)</strong> Liquid Neural Networks. If prediction ≠ reality, it corrects instantly.</div></div><div class="tl"><div class="tl-y">10Hz</div><div class="tl-t"><strong>Cortex</strong> — World model. Learns online by minimizing <strong>variational free energy</strong> (prediction error). Uses <strong>LTC (Liquid Time-Constant)</strong> networks. No training phase — continuously adapts to the environment.</div></div><div class="tl"><div class="tl-y">Async</div><div class="tl-t"><strong>Hippocampus</strong> — Episodic memory. Stores sensorimotor experiences as episodes. Retrieves by cosine similarity. "I've been in a situation like this before — here's what worked."</div></div><div class="tl"><div class="tl-y">Async</div><div class="tl-t"><strong>Basal Ganglia</strong> — Action selection. Evaluates candidate trajectories via <strong>expected free energy</strong> (information gain + goal achievement). Picks the safest, most informative path.</div></div><p class="rs">Written in <strong>Python</strong>, using <strong>PyTorch</strong> for neural components and <strong>MuJoCo</strong> for physics simulation. Runs at <strong>1000 Hz on a laptop CPU</strong>. No GPU required. ~20 watts total power draw.</p><p class="rs">No backpropagation. No training dataset. No reward function. The brain learns by <strong>minimizing surprise</strong> — the core principle of Active Inference.</p>`,n:["What is Active Inference?","Show me results","20n vs industry"]},fr:{q:"20n — Architecture technique",h:`<div class="rh">En profondeur</div><div class="rt">Cinq couches. Un cerveau.</div><p class="rs">L'architecture 20n est modelée sur le <strong>cerveau biologique</strong>. Chaque couche opère à une fréquence différente :</p><div class="tl"><div class="tl-y">1kHz</div><div class="tl-t"><strong>Moelle épinière</strong> — Réflexes câblés et contrôle postural. Contrôleurs PD pour la stabilité articulaire. La boucle la plus rapide — réagit avant que le cerveau ne "pense."</div></div><div class="tl"><div class="tl-y">100Hz</div><div class="tl-t"><strong>Cervelet</strong> — Modèle corporel interne via simulation forward. Prédit les positions articulaires avec des <strong>Liquid Neural Networks CfC</strong>. Si prédiction ≠ réalité, correction instantanée.</div></div><div class="tl"><div class="tl-y">10Hz</div><div class="tl-t"><strong>Cortex</strong> — Modèle du monde. Apprend en minimisant l'<strong>énergie libre variationnelle</strong>. Utilise des réseaux <strong>LTC</strong>. Zéro phase d'entraînement — adaptation continue.</div></div><div class="tl"><div class="tl-y">Async</div><div class="tl-t"><strong>Hippocampe</strong> — Mémoire épisodique. Stocke les expériences sensorimotrices, les retrouve par similarité cosinus.</div></div><div class="tl"><div class="tl-y">Async</div><div class="tl-t"><strong>Ganglions de la base</strong> — Sélection d'action. Évalue les trajectoires candidates via l'<strong>énergie libre attendue</strong>. Choisit le chemin le plus sûr et informatif.</div></div><p class="rs">Écrit en <strong>Python</strong>, avec <strong>PyTorch</strong> et <strong>MuJoCo</strong>. Tourne à <strong>1000 Hz sur un CPU de laptop</strong>. Pas de GPU. ~20 watts.</p><p class="rs">Zéro backpropagation. Zéro dataset. Zéro fonction de récompense. Le cerveau apprend en <strong>minimisant la surprise</strong>.</p>`,n:["C'est quoi l'Active Inference ?","Résultats","Comparaison industrie"]}},

active_inference:{en:{q:"What is Active Inference?",h:`<div class="rt">Active Inference & the Free Energy Principle</div><p class="rs"><strong>Active Inference</strong> is a theory by <strong>Karl Friston</strong> (2010), based on the <strong>Free Energy Principle</strong>. The core idea: all living systems minimize surprise (prediction error). The brain constantly predicts its sensory input, acts to fulfill those predictions, and updates its model when wrong.</p><div class="rq">You don't need a reward function. You don't need a training dataset. You just need a system that wants to be a good model of its environment. That's it. That's intelligence.</div><p class="rs"><strong>Karl Friston</strong> is a neuroscientist at UCL London — the most cited neuroscientist alive. His work on the Free Energy Principle is the theoretical backbone of 20n.</p><div class="cmp"><div class="cmp-c"><div class="cmp-h">Reinforcement Learning</div><div class="cmp-i">× Needs reward function<br>× Millions of training steps<br>× Maximizes external signal<br>× Brittle to new environments<br>× Computationally expensive</div></div><div class="cmp-c"><div class="cmp-h">Active Inference</div><div class="cmp-i">→ No reward needed<br>→ Zero training steps<br>→ Minimizes prediction error<br>→ Adapts continuously<br>→ Runs on 20 watts</div></div></div><p class="rs">20n implements Active Inference computationally using <strong>Liquid Neural Networks</strong> (CfC/LTC), developed at MIT by Radu Hasani et al. These networks have continuous-time dynamics — they don't just process data, they <strong>evolve over time</strong>, like biological neurons.</p>`,n:["Technical details","Show me results","Tell me about 20n"]},fr:{q:"C'est quoi l'Active Inference ?",h:`<div class="rt">Active Inference & Principe d'Énergie Libre</div><p class="rs">L'<strong>Active Inference</strong> est une théorie de <strong>Karl Friston</strong> (2010), basée sur le <strong>Principe d'Énergie Libre</strong>. L'idée : tout système vivant minimise la surprise (erreur de prédiction). Le cerveau prédit en permanence ses entrées sensorielles, agit pour réaliser ces prédictions, et met à jour son modèle quand il se trompe.</p><div class="rq">Pas besoin de fonction de récompense. Pas besoin de dataset. Juste un système qui veut être un bon modèle de son environnement. C'est ça, l'intelligence.</div><p class="rs"><strong>Karl Friston</strong> est neuroscientifique à UCL Londres — le neuroscientifique le plus cité au monde. Son travail est le socle théorique de 20n.</p><div class="cmp"><div class="cmp-c"><div class="cmp-h">Reinforcement Learning</div><div class="cmp-i">× Besoin de récompense<br>× Millions d'étapes d'entraînement<br>× Maximise un signal externe<br>× Fragile en nouvel environnement<br>× Coûteux en calcul</div></div><div class="cmp-c"><div class="cmp-h">Active Inference</div><div class="cmp-i">→ Zéro récompense<br>→ Zéro entraînement<br>→ Minimise l'erreur de prédiction<br>→ Adaptation continue<br>→ 20 watts</div></div></div><p class="rs">20n implémente l'Active Inference avec des <strong>Liquid Neural Networks</strong> (CfC/LTC), développées au MIT par Radu Hasani. Ces réseaux ont des dynamiques en temps continu — ils <strong>évoluent dans le temps</strong>, comme les neurones biologiques.</p>`,n:["Détails techniques","Résultats","Parle-moi de 20n"]}},

results:{en:{q:"Results & benchmarks",h:`<div class="rt">Same brain. Different bodies. Zero tuning.</div><p class="rs">Validated on three MuJoCo robot morphologies with <strong>zero retraining</strong>. One set of parameters. Three radically different bodies.</p><table style="width:100%;border-collapse:collapse;font-size:13px;margin:18px 0;border:1px solid #eee"><thead><tr style="background:#0a0a0a;color:#fff"><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Robot</th><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Joints</th><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Max</th><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Mean</th><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Status</th></tr></thead><tbody><tr style="border-bottom:1px solid #eee"><td style="padding:10px 14px"><strong>Walker2d</strong></td><td style="padding:10px 14px">6 (2D)</td><td style="padding:10px 14px"><strong style="background:#0a0a0a;color:#fff;padding:2px 7px">1000</strong></td><td style="padding:10px 14px;font-weight:600">952</td><td style="padding:10px 14px;color:#666">Near-perfect</td></tr><tr style="border-bottom:1px solid #eee"><td style="padding:10px 14px"><strong>Ant</strong></td><td style="padding:10px 14px">8 (3D)</td><td style="padding:10px 14px"><strong style="background:#0a0a0a;color:#fff;padding:2px 7px">1000</strong></td><td style="padding:10px 14px;font-weight:600">667</td><td style="padding:10px 14px;color:#666">Solved</td></tr><tr><td style="padding:10px 14px"><strong>Humanoid</strong></td><td style="padding:10px 14px">17 (3D)</td><td style="padding:10px 14px;font-weight:600">474</td><td style="padding:10px 14px">163</td><td style="padding:10px 14px;color:#666">Hardest. Improving.</td></tr></tbody></table><p class="rs">No training phase. No GPU cluster. The brain runs at <strong>1000 Hz on a laptop CPU</strong> and figures out each body from scratch in real time.</p><p class="rs"><strong>MuJoCo</strong> is a physics simulator by DeepMind — the industry standard for robotics benchmarks. A score of 1000 means maximum performance on the task (walking, running, balancing). Walker2d is 2D bipedal, Ant is 4-legged 3D, Humanoid is 17-joint 3D — the hardest benchmark.</p>`,n:["Tell me about 20n","Technical details","Contact"]},fr:{q:"Résultats & benchmarks",h:`<div class="rt">Même cerveau. Corps différents. Zéro tuning.</div><p class="rs">Validé sur trois morphologies MuJoCo avec <strong>zéro réentraînement</strong>. Un jeu de paramètres. Trois corps radicalement différents.</p><table style="width:100%;border-collapse:collapse;font-size:13px;margin:18px 0;border:1px solid #eee"><thead><tr style="background:#0a0a0a;color:#fff"><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Robot</th><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Joints</th><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Max</th><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Moy.</th><th style="padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Statut</th></tr></thead><tbody><tr style="border-bottom:1px solid #eee"><td style="padding:10px 14px"><strong>Walker2d</strong></td><td style="padding:10px 14px">6 (2D)</td><td style="padding:10px 14px"><strong style="background:#0a0a0a;color:#fff;padding:2px 7px">1000</strong></td><td style="padding:10px 14px;font-weight:600">952</td><td style="padding:10px 14px;color:#666">Quasi-parfait</td></tr><tr style="border-bottom:1px solid #eee"><td style="padding:10px 14px"><strong>Ant</strong></td><td style="padding:10px 14px">8 (3D)</td><td style="padding:10px 14px"><strong style="background:#0a0a0a;color:#fff;padding:2px 7px">1000</strong></td><td style="padding:10px 14px;font-weight:600">667</td><td style="padding:10px 14px;color:#666">Résolu</td></tr><tr><td style="padding:10px 14px"><strong>Humanoid</strong></td><td style="padding:10px 14px">17 (3D)</td><td style="padding:10px 14px;font-weight:600">474</td><td style="padding:10px 14px">163</td><td style="padding:10px 14px;color:#666">Le + dur. En progrès.</td></tr></tbody></table><p class="rs">Zéro phase d'entraînement. Zéro cluster GPU. Le cerveau tourne à <strong>1000 Hz sur un CPU de laptop</strong>.</p><p class="rs"><strong>MuJoCo</strong> est un simulateur physique de DeepMind — le standard pour les benchmarks robotiques. Un score de 1000 = performance maximale.</p>`,n:["Parle-moi de 20n","Détails techniques","Contact"]}},

compare:{en:{q:"How does 20n compare?",h:`<div class="rt">Traditional AI vs. 20n</div><div class="cmp"><div class="cmp-c"><div class="cmp-h">Industry standard</div><div class="cmp-i">× Millions of GPU hours<br>× One model per task<br>× Brittle outside training data<br>× Hundreds of watts<br>× $20B spent, 0 general robots</div></div><div class="cmp-c"><div class="cmp-h">20n / Active Inference</div><div class="cmp-i">→ Real-time, no pre-training<br>→ One brain, all skills<br>→ Adapts on the fly<br>→ 20 watts on CPU<br>→ 3 bodies, 1 architecture</div></div></div><div class="rq">This is not a scaling problem. It is an architecture problem. You cannot brute-force infinity.</div><p class="rs"><strong>vs Boston Dynamics</strong>: BD uses hand-crafted controllers per robot, per task. No learning, no generalization. 20n uses one brain for all bodies.</p><p class="rs"><strong>vs Tesla Optimus</strong>: Tesla uses imitation learning — needs massive human demo data. 20n needs zero data. Learns in real time.</p><p class="rs"><strong>vs Figure</strong>: Figure uses LLMs for high-level commands + separate low-level controllers. 20n is end-to-end: one brain, perception to action.</p>`,n:["Show me results","Tell me about 20n","Contact"]},fr:{q:"Comparaison avec l'industrie",h:`<div class="rt">IA traditionnelle vs. 20n</div><div class="cmp"><div class="cmp-c"><div class="cmp-h">Standard industrie</div><div class="cmp-i">× Millions d'heures GPU<br>× Un modèle par tâche<br>× Fragile hors données d'entraînement<br>× Centaines de watts<br>× 20Md$ dépensés, 0 robot général</div></div><div class="cmp-c"><div class="cmp-h">20n / Active Inference</div><div class="cmp-i">→ Temps réel, zéro entraînement<br>→ Un cerveau, toutes les compétences<br>→ S'adapte en live<br>→ 20 watts sur CPU<br>→ 3 corps, 1 architecture</div></div></div><div class="rq">Ce n'est pas un problème de scale. C'est un problème d'architecture. On ne peut pas brute-forcer l'infini.</div><p class="rs"><strong>vs Boston Dynamics</strong> : BD utilise des contrôleurs faits main par robot. 20n utilise un cerveau pour tous.</p><p class="rs"><strong>vs Tesla Optimus</strong> : Tesla utilise l'imitation learning — besoin de data massive. 20n a besoin de zéro donnée.</p><p class="rs"><strong>vs Figure</strong> : Figure utilise des LLMs + contrôleurs séparés. 20n est end-to-end.</p>`,n:["Résultats","Parle-moi de 20n","Contact"]}},

"20n_business":{en:{q:"20n — Business & Status",h:`<div class="rt">Where 20n stands today.</div><p class="rs"><strong>Stage</strong>: Research / prototype phase. The architecture works in simulation (MuJoCo). Next step: sim-to-real transfer on physical hardware.</p><p class="rs"><strong>Team</strong>: Solo founder — Nicolas PHILIPPE. Based in Paris.</p><p class="rs"><strong>Funding</strong>: Not yet raised. Currently bootstrapped. In conversations with <strong>J12 Ventures</strong>, <strong>Plug and Play</strong>, and <strong>MIT professors</strong>.</p><p class="rs"><strong>Business model</strong>: License the universal brain to robot manufacturers. Think: "Intel Inside" but for robot intelligence. B2B. Could also sell as SaaS for simulation/testing, or eventually build proprietary robots.</p><p class="rs"><strong>Open source</strong>: Not yet. Core architecture is proprietary. Plans to open-source non-critical components eventually.</p><p class="rs"><strong>Market</strong>: Global robotics market projected at <strong>$200B+ by 2030</strong>. Every humanoid robot manufacturer needs a brain. Currently, nobody has a general one.</p><div class="rq">Roadmap: more body types → sim-to-real transfer → real hardware demo → fundraise → commercialize.</div>`,n:["Who are the investors?","Tell me about 20n","Contact"]},fr:{q:"20n — Business & Statut",h:`<div class="rt">Où en est 20n aujourd'hui.</div><p class="rs"><strong>Étape</strong> : Recherche / prototype. L'architecture fonctionne en simulation (MuJoCo). Prochaine étape : transfert sim-to-real sur du hardware physique.</p><p class="rs"><strong>Équipe</strong> : Fondateur solo — Nicolas PHILIPPE. Basé à Paris.</p><p class="rs"><strong>Financement</strong> : Pas encore levé. Bootstrappé. En discussion avec <strong>J12 Ventures</strong>, <strong>Plug and Play</strong> et des <strong>professeurs du MIT</strong>.</p><p class="rs"><strong>Business model</strong> : Licencier le cerveau universel aux fabricants de robots. B2B. Ou SaaS pour simulation, ou construire ses propres robots à terme.</p><p class="rs"><strong>Open source</strong> : Pas encore. L'architecture core est propriétaire. Plans pour open-sourcer les composants non-critiques.</p><p class="rs"><strong>Marché</strong> : Marché mondial de la robotique projeté à <strong>200Md$+ d'ici 2030</strong>.</p><div class="rq">Roadmap : plus de morphologies → sim-to-real → démo hardware réel → levée de fonds → commercialisation.</div>`,n:["Les investisseurs","Parle-moi de 20n","Contact"]}},

friday:{en:{q:"What was Friday?",h:`<div class="rh">September 2025 — January 2026</div><div class="rt">Friday — The AI that controlled your Mac.</div><p class="rs">Friday was an <strong>autonomous AI agent</strong> that controlled any Mac interface like a human. No APIs, no cloud — pure <strong>computer vision + chain-of-thought reasoning</strong>. It could see the screen, move the mouse, type on the keyboard.</p><p class="rs">It delegated to the best tools: ChatGPT for writing, Gamma for presentations, Canva for design, Perplexity for research. Automated presentations, emails, PDF summaries. <strong>100% on-device</strong>.</p><div class="rq">Friday proved that a brain could understand and act on a digital environment. The question became: what if the environment is physical? That led directly to 20n.</div><p class="rs"><strong>Not like Siri</strong> (voice commands to Apple APIs). <strong>Not like Copilot</strong> (code completion). Friday literally <strong>saw and controlled the screen</strong> like a human would.</p><p class="rs">Tech: Python, computer vision (screenshots + OCR), LLM reasoning, pyautogui for mouse/keyboard control. V1 was simpler, V2 had better reasoning chains.</p><p class="rs">Why stopped: proved the concept. The natural next step was physical environments → robots → <strong>20n</strong>. Friday was Phase 1.</p><a href="https://usefriday.app" class="pc-a" target="_blank">usefriday.app →</a>`,n:["Tell me about 20n","All projects","His journey"]},fr:{q:"C'est quoi Friday ?",h:`<div class="rh">Septembre 2025 — Janvier 2026</div><div class="rt">Friday — L'IA qui contrôlait ton Mac.</div><p class="rs">Friday était un <strong>agent IA autonome</strong> qui contrôlait n'importe quelle interface Mac comme un humain. Pas d'API, pas de cloud — <strong>vision par ordinateur + raisonnement en chaîne</strong>. Il voyait l'écran, bougeait la souris, tapait au clavier.</p><p class="rs">Il déléguait aux meilleurs outils : ChatGPT pour l'écriture, Gamma pour les présentations, Canva pour le design, Perplexity pour la recherche. <strong>100% local</strong>.</p><div class="rq">Friday a prouvé qu'un cerveau pouvait comprendre et agir sur un environnement numérique. La question est devenue : et si l'environnement était physique ? Ça a mené directement à 20n.</div><p class="rs">Tech : Python, vision par ordinateur, raisonnement LLM, pyautogui. V1 plus simple, V2 avec de meilleurs chaînes de raisonnement.</p><p class="rs">Pourquoi arrêté : le concept était prouvé. L'étape naturelle : environnements physiques → robots → <strong>20n</strong>.</p><a href="https://usefriday.app" class="pc-a" target="_blank">usefriday.app →</a>`,n:["Parle-moi de 20n","Tous les projets","Son parcours complet"]}},

nerve:{en:{q:"NERVE & Eve",h:`<div class="rh">2025</div><div class="rt">NERVE + Eve</div><p class="rs"><strong>NERVE</strong>: Full-stack Cloud FinOps/GreenOps orchestrator. Monitors GPU spend across cloud providers, optimizes workloads, reduces carbon footprint. Built the <strong>Wattless dashboard</strong> in React + TypeScript. Backend in Node.js.</p><p class="rs"><strong>FinOps</strong> = financial operations for cloud (optimize spending). <strong>GreenOps</strong> = same but for environmental impact.</p><p class="rs"><strong>Eve</strong>: Autonomous AI agent built on top of NERVE. You describe what you want in a conversation, Eve <strong>generates the code, picks the optimal GPU, deploys, and trains the model</strong>. Like AutoML but conversational and fully autonomous.</p><div class="rq">NERVE showed Nicolas could build a full production stack — frontend, backend, infra. Eve showed he could make AI that creates AI. Both informed the architecture thinking that became 20n.</div><p class="rs">Not currently active — focus shifted to Friday then 20n. Code available on GitHub.</p><a href="https://github.com/Nick0-ai/nerve-backend" class="pc-a" target="_blank">GitHub →</a>`,n:["All projects","His journey","Tell me about 20n"]},fr:{q:"NERVE & Eve",h:`<div class="rh">2025</div><div class="rt">NERVE + Eve</div><p class="rs"><strong>NERVE</strong> : Orchestrateur Cloud FinOps/GreenOps full-stack. Monitore les dépenses GPU, optimise les workloads, réduit l'empreinte carbone. Dashboard <strong>Wattless</strong> en React + TypeScript. Backend Node.js.</p><p class="rs"><strong>Eve</strong> : Agent IA autonome. Tu décris ce que tu veux, Eve <strong>génère le code, choisit le GPU optimal, déploie et entraîne le modèle</strong>. Comme AutoML mais conversationnel.</p><div class="rq">NERVE a montré que Nicolas pouvait construire un stack de production complet. Eve a montré qu'il pouvait faire de l'IA qui crée de l'IA. Les deux ont informé l'architecture de 20n.</div><p class="rs">Plus actif — focus sur Friday puis 20n. Code sur GitHub.</p><a href="https://github.com/Nick0-ai/nerve-backend" class="pc-a" target="_blank">GitHub →</a>`,n:["Tous les projets","Son parcours complet","Parle-moi de 20n"]}},

paact:{en:{q:"PAACT",h:`<div class="rh">January 2026 — present</div><div class="rt">PAACT — Bet money on your goals.</div><p class="rs">iOS productivity app born from winning <strong>Innov Hack Paris</strong>. Built the entire app in <strong>7 days</strong> post-hackathon. Swift, SwiftUI, Core Data.</p><p class="rs"><strong>Commitment contracts</strong>: set a goal, put money on it. Fail and you pay. Based on behavioral economics — <strong>loss aversion is stronger than motivation</strong>.</p><div class="stats"><div><div class="st-v">7</div><div class="st-l">Days to build</div></div><div><div class="st-v">iOS</div><div class="st-l">Platform</div></div><div><div class="st-v">Swift</div><div class="st-l">Language</div></div></div><p class="rs">Features: goal setting, financial stakes, progress tracking, deadline management. Clean, minimal UI. Designed and coded entirely by Nicolas.</p><p class="rs">App Store submission in progress. Not open source. No Android version planned yet.</p><p class="rs">Different from other goal apps: PAACT uses real financial stakes, not just reminders. Closer to <strong>Beeminder</strong> but with a simpler, cleaner UX.</p>`,n:["About hackathons","All projects","Contact"]},fr:{q:"PAACT",h:`<div class="rh">Janvier 2026 — présent</div><div class="rt">PAACT — Mise ton argent sur tes objectifs.</div><p class="rs">App iOS née de la victoire au <strong>Innov Hack Paris</strong>. Construite intégralement en <strong>7 jours</strong> post-hackathon. Swift, SwiftUI, Core Data.</p><p class="rs"><strong>Contrats d'engagement</strong> : fixe un objectif, mise de l'argent. Échoue et tu paies. Basé sur l'économie comportementale — <strong>l'aversion à la perte est plus forte que la motivation</strong>.</p><div class="stats"><div><div class="st-v">7</div><div class="st-l">Jours pour construire</div></div><div><div class="st-v">iOS</div><div class="st-l">Plateforme</div></div><div><div class="st-v">Swift</div><div class="st-l">Langage</div></div></div><p class="rs">Soumission App Store en cours. Pas open source. Pas de version Android prévue.</p>`,n:["Les hackathons","Tous les projets","Contact"]}},

glowgum:{en:{q:"GlowGum",h:`<div class="rh">March — June 2025</div><div class="rt">GlowGum — The first gum that takes care of your skin.</div><p class="rs">First serious <strong>non-tech venture</strong>. Created a beauty chewing-gum brand from scratch — concept, brand identity, product sourcing, supplier negotiation, e-commerce store, TikTok marketing campaign.</p><div class="stats"><div><div class="st-v">12k</div><div class="st-l">TikTok followers</div></div><div><div class="st-v">15</div><div class="st-l">Days to grow</div></div><div><div class="st-v">4 mo</div><div class="st-l">Duration</div></div></div><p class="rs">Grew to <strong>12,000 TikTok followers in 15 days</strong>. Full e-commerce operation. Target audience: young people interested in beauty/wellness.</p><p class="rs">Learned: digital marketing, brand strategy, supply chain management, supplier negotiation, content creation. Proved he could build and sell <strong>anything</strong>, not just code.</p><p class="rs">Why stopped: shifted focus back to tech/AI. GlowGum taught him business versatility. Solo project from end to end.</p>`,n:["His entrepreneurial arc","All projects","His journey"]},fr:{q:"GlowGum",h:`<div class="rh">Mars — Juin 2025</div><div class="rt">GlowGum — Le premier chewing-gum qui prend soin de ta peau.</div><p class="rs">Premier projet sérieux <strong>hors tech</strong>. Marque de chewing-gum beauté créée de zéro — concept, identité, sourcing, négociation fournisseurs, e-commerce, campagne TikTok.</p><div class="stats"><div><div class="st-v">12k</div><div class="st-l">Abonnés TikTok</div></div><div><div class="st-v">15</div><div class="st-l">Jours de croissance</div></div><div><div class="st-v">4 mois</div><div class="st-l">Durée</div></div></div><p class="rs"><strong>12 000 abonnés TikTok en 15 jours</strong>. Opération e-commerce complète. Cible : jeunes intéressés beauté/bien-être.</p><p class="rs">Appris : marketing digital, stratégie de marque, supply chain, négociation fournisseurs. A prouvé qu'il pouvait vendre <strong>n'importe quoi</strong>, pas que du code.</p><p class="rs">Pourquoi arrêté : retour au focus tech/IA. Projet solo de A à Z.</p>`,n:["Son parcours entrepreneurial","Tous les projets","Son parcours complet"]}},

freelance:{en:{q:"Freelance beginnings",h:`<div class="rh">2023 — 2024</div><div class="rt">First business at 16. Selling websites in Alsace.</div><p class="rs">Started at 16. Sold and built websites for <strong>small businesses (PME) in Alsace</strong>, France. Cold prospecting: went door to door, called businesses, pitched website redesigns.</p><p class="rs">Full end-to-end: <strong>find client → negotiate → design → develop → deliver → get paid</strong>. Used HTML/CSS/JS, some WordPress. Built several sites for local shops, restaurants, artisans.</p><p class="rs">Clients were surprised by his age but impressed by results. Parents were supportive. It was hard to sell at 16 — but that's where he learned <strong>how to sell, negotiate, and manage clients</strong>.</p><div class="rq">Most important lesson: technical skills are useless if you can't convince someone to pay for them. This is where business instinct was forged.</div><p class="rs">Stopped to focus on bigger tech projects (GlowGum, then AI). Would recommend freelancing to anyone starting out — it teaches everything school doesn't.</p>`,n:["His entrepreneurial arc","All projects","Contact"]},fr:{q:"Ses débuts en freelance",h:`<div class="rh">2023 — 2024</div><div class="rt">Premier business à 16 ans. Vente de sites en Alsace.</div><p class="rs">A commencé à 16 ans. Vente et création de sites web pour <strong>PME en Alsace</strong>. Prospection à froid : porte-à-porte, appels, pitch de refonte de sites.</p><p class="rs">De bout en bout : <strong>trouver le client → négocier → designer → développer → livrer → encaisser</strong>. HTML/CSS/JS, un peu de WordPress.</p><p class="rs">Les clients étaient surpris par son âge mais impressionnés par les résultats. Dur de vendre à 16 ans — mais c'est là qu'il a appris à <strong>vendre, négocier et gérer des clients</strong>.</p><div class="rq">La leçon la plus importante : les compétences techniques sont inutiles si tu ne sais pas convaincre quelqu'un de payer. C'est ici que l'instinct business s'est forgé.</div><p class="rs">Recommande le freelance à tout le monde pour commencer — ça enseigne tout ce que l'école n'enseigne pas.</p>`,n:["Son parcours entrepreneurial","Tous les projets","Contact"]}},

projects:{en:{q:"All projects",h:`<div class="rt">Selected work</div><div class="pc"><div class="pc-h"><div class="pc-n">20n</div><div class="pc-t">Jan 2026 — present</div></div><div class="pc-b"><p class="pc-d">Universal artificial brain for robots. Biomimetic architecture based on Active Inference and Liquid Neural Networks. Runs on a single CPU, 20 watts. Benchmarked on MuJoCo. Winner of Innov Hack Paris 2026.</p><div class="pc-m"><div><div class="pc-mv">1kHz</div><div class="pc-ml">Inference</div></div><div><div class="pc-mv">3</div><div class="pc-ml">Bodies</div></div><div><div class="pc-mv">20W</div><div class="pc-ml">Power</div></div></div><a href="https://20n.dev" class="pc-a" target="_blank">20n.dev →</a></div></div><div class="pc"><div class="pc-h"><div class="pc-n">PAACT</div><div class="pc-t">Jan 2026 — present</div></div><div class="pc-b"><p class="pc-d">iOS productivity app. Commitment contracts — bet money on your goals. Built in 7 days post-hackathon. Swift, SwiftUI.</p></div></div><div class="pc"><div class="pc-h"><div class="pc-n">Friday</div><div class="pc-t">Sep 2025 — Jan 2026</div></div><div class="pc-b"><p class="pc-d">Autonomous AI agent for Mac. Computer vision + chain-of-thought reasoning. 100% on-device. The proof-of-concept that led to 20n.</p><a href="https://usefriday.app" class="pc-a" target="_blank">usefriday.app →</a></div></div><div class="pc"><div class="pc-h"><div class="pc-n">NERVE + Eve</div><div class="pc-t">2025</div></div><div class="pc-b"><p class="pc-d">Cloud FinOps/GreenOps orchestrator + autonomous AI training agent. React, TypeScript, Node.js.</p><a href="https://github.com/Nick0-ai/nerve-backend" class="pc-a" target="_blank">GitHub →</a></div></div><div class="pc"><div class="pc-h"><div class="pc-n">GlowGum</div><div class="pc-t">Mar — Jun 2025</div></div><div class="pc-b"><p class="pc-d">Beauty chewing-gum brand. 12k TikTok followers in 15 days. E-commerce, marketing, supplier negotiation.</p></div></div><div class="pc"><div class="pc-h"><div class="pc-n">Freelance Web Dev</div><div class="pc-t">2023 — 2024</div></div><div class="pc-b"><p class="pc-d">First business at 16. Websites for SMBs in Alsace. Prospecting, negotiation, full project management.</p></div></div>`,n:["Tell me about 20n","His full journey","Contact"]},fr:{q:"Tous les projets",h:`<div class="rt">Travaux sélectionnés</div><div class="pc"><div class="pc-h"><div class="pc-n">20n</div><div class="pc-t">Jan 2026 — présent</div></div><div class="pc-b"><p class="pc-d">Cerveau artificiel universel pour robots. Architecture biomimétique, Active Inference, Liquid Neural Networks. 20 watts. Vainqueur Innov Hack Paris 2026.</p><div class="pc-m"><div><div class="pc-mv">1kHz</div><div class="pc-ml">Inférence</div></div><div><div class="pc-mv">3</div><div class="pc-ml">Corps</div></div><div><div class="pc-mv">20W</div><div class="pc-ml">Puissance</div></div></div><a href="https://20n.dev" class="pc-a" target="_blank">20n.dev →</a></div></div><div class="pc"><div class="pc-h"><div class="pc-n">PAACT</div><div class="pc-t">Jan 2026 — présent</div></div><div class="pc-b"><p class="pc-d">App iOS. Contrats d'engagement — mise ton argent sur tes objectifs. 7 jours post-hackathon. Swift, SwiftUI.</p></div></div><div class="pc"><div class="pc-h"><div class="pc-n">Friday</div><div class="pc-t">Sep 2025 — Jan 2026</div></div><div class="pc-b"><p class="pc-d">Agent IA autonome pour Mac. Vision par ordinateur + raisonnement. 100% local. La preuve de concept qui a mené à 20n.</p><a href="https://usefriday.app" class="pc-a" target="_blank">usefriday.app →</a></div></div><div class="pc"><div class="pc-h"><div class="pc-n">NERVE + Eve</div><div class="pc-t">2025</div></div><div class="pc-b"><p class="pc-d">Orchestrateur Cloud FinOps/GreenOps + agent IA autonome. React, TypeScript, Node.js.</p><a href="https://github.com/Nick0-ai/nerve-backend" class="pc-a" target="_blank">GitHub →</a></div></div><div class="pc"><div class="pc-h"><div class="pc-n">GlowGum</div><div class="pc-t">Mar — Juin 2025</div></div><div class="pc-b"><p class="pc-d">Marque de chewing-gum beauté. 12k abonnés TikTok en 15 jours. E-commerce, marketing, négociation fournisseurs.</p></div></div><div class="pc"><div class="pc-h"><div class="pc-n">Freelance Web</div><div class="pc-t">2023 — 2024</div></div><div class="pc-b"><p class="pc-d">Premier business à 16 ans. Sites web pour PME en Alsace. Prospection, négociation, gestion de A à Z.</p></div></div>`,n:["Parle-moi de 20n","Son parcours complet","Contact"]}},

journey:{en:{q:"His full journey",h:`<div class="rt">No school. Just shipping.</div><div class="tl"><div class="tl-y now">Now</div><div class="tl-t"><strong>20n Research Laboratory</strong> — Universal brain for robots. Active Inference, Liquid Neural Networks. J12, Plug and Play, MIT professors. Winner Innov Hack Paris 2026.</div></div><div class="tl"><div class="tl-y">Jan 2026</div><div class="tl-t"><strong>PAACT</strong> — iOS app in 7 days post-hackathon. Commitment contracts.</div></div><div class="tl"><div class="tl-y">Sep 2025</div><div class="tl-t"><strong>Friday</strong> — Autonomous AI agent for Mac. Computer vision + reasoning. Led directly to 20n.</div></div><div class="tl"><div class="tl-y">2025</div><div class="tl-t"><strong>NERVE + Eve</strong> — Cloud FinOps platform. Autonomous AI training agent.</div></div><div class="tl"><div class="tl-y">Mar 2025</div><div class="tl-t"><strong>GlowGum</strong> — Beauty chewing-gum brand. 12k TikTok in 15 days.</div></div><div class="tl"><div class="tl-y">2023</div><div class="tl-t"><strong>Freelance web dev</strong> — First business at 16. Websites for SMBs in Alsace.</div></div><div class="tl"><div class="tl-y">2023</div><div class="tl-t"><strong>Started coding</strong> — Python, trading bots, then JS, React, ML, neuroscience. Self-taught.</div></div><div class="tl"><div class="tl-y">2012–24</div><div class="tl-t"><strong>Competitive swimming</strong> — 12 years. Discipline and mental toughness.</div></div>`,n:["Tell me about 20n","What's his stack?","Contact"]},fr:{q:"Son parcours complet",h:`<div class="rt">Pas d'école. Que du shipping.</div><div class="tl"><div class="tl-y now">Auj.</div><div class="tl-t"><strong>20n Research Laboratory</strong> — Cerveau universel pour robots. Active Inference. J12, Plug and Play, profs MIT. Vainqueur Innov Hack Paris 2026.</div></div><div class="tl"><div class="tl-y">Jan 2026</div><div class="tl-t"><strong>PAACT</strong> — App iOS en 7 jours. Contrats d'engagement.</div></div><div class="tl"><div class="tl-y">Sep 2025</div><div class="tl-t"><strong>Friday</strong> — Agent IA autonome pour Mac. A mené à 20n.</div></div><div class="tl"><div class="tl-y">2025</div><div class="tl-t"><strong>NERVE + Eve</strong> — Plateforme Cloud FinOps. Agent IA d'entraînement.</div></div><div class="tl"><div class="tl-y">Mar 2025</div><div class="tl-t"><strong>GlowGum</strong> — Marque chewing-gum beauté. 12k TikTok en 15 jours.</div></div><div class="tl"><div class="tl-y">2023</div><div class="tl-t"><strong>Freelance web</strong> — Premier business à 16 ans. PME en Alsace.</div></div><div class="tl"><div class="tl-y">2023</div><div class="tl-t"><strong>Début du code</strong> — Python, bots de trading, puis JS, React, ML, neurosciences. 100% autodidacte.</div></div><div class="tl"><div class="tl-y">2012–24</div><div class="tl-t"><strong>Natation en compétition</strong> — 12 ans. Discipline et mental.</div></div>`,n:["Parle-moi de 20n","Ses compétences","Contact"]}},

entrepreneurship:{en:{q:"His entrepreneurial journey",h:`<div class="rt">From trading bots to robot brains.</div><p class="rs">It started at <strong>16</strong>. Nicolas taught himself Python and immediately built <strong>trading bots</strong>. Not for the money — to see if a machine could make decisions.</p><p class="rs">Then: <strong>selling websites to SMBs in Alsace</strong> (2023–2024). Cold prospecting, negotiation, client management. Real business at 16.</p><p class="rs"><strong>GlowGum</strong> (March–June 2025) — beauty chewing-gum brand. 12,000 TikTok followers in 15 days. E-commerce, digital marketing, supplier negotiation from zero.</p><p class="rs">Meanwhile: <strong>NERVE</strong> — Cloud FinOps. <strong>Eve</strong> — AI that creates AI. <strong>Friday</strong> — agent that controlled a Mac like a human.</p><div class="rq">Each project proved the same mind could operate in a new environment. Websites. E-commerce. Cloud. A desktop OS. And now — a physical body.</div><p class="rs">Friday proved it for screens. <strong>20n</strong> proves it for robots. From pixels to physics.</p>`,n:["All projects","Tell me about 20n","Who is Nicolas?"]},fr:{q:"Son parcours entrepreneurial",h:`<div class="rt">Des bots de trading aux cerveaux de robots.</div><p class="rs">Tout a commencé à <strong>16 ans</strong>. Nicolas a appris Python seul et a construit des <strong>bots de trading</strong>. Pas pour l'argent — pour voir si une machine pouvait décider.</p><p class="rs">Puis : <strong>vente de sites web pour PME en Alsace</strong> (2023–2024). Prospection à froid, négociation. Du vrai business à 16 ans.</p><p class="rs"><strong>GlowGum</strong> (mars–juin 2025) — marque de chewing-gum beauté. 12 000 TikTok en 15 jours. E-commerce, marketing digital.</p><p class="rs">En parallèle : <strong>NERVE</strong> — Cloud FinOps. <strong>Eve</strong> — IA qui crée des IA. <strong>Friday</strong> — agent Mac autonome.</p><div class="rq">Chaque projet prouvait que le même esprit pouvait opérer dans un nouvel environnement. Sites. E-commerce. Cloud. Un OS. Et maintenant — un corps physique.</div><p class="rs">Friday l'a prouvé pour les écrans. <strong>20n</strong> le prouve pour les robots. Des pixels à la physique.</p>`,n:["Tous les projets","Parle-moi de 20n","Qui est Nicolas ?"]}},

hackathons:{en:{q:"Hackathons & competitions",h:`<div class="rt">Competing under pressure.</div><div class="pc"><div class="pc-h"><div class="pc-n">Innov Hack Paris</div><div class="pc-t">January 2026</div></div><div class="pc-b"><p class="pc-d"><strong>Winner — 1st place</strong> among 150 participants. 10 hours non-stop. Presented 20n's universal brain concept. This is where PAACT was born. Team of 4 people. Judged on innovation, feasibility, and presentation quality.</p><div class="pc-m"><div><div class="pc-mv">1st</div><div class="pc-ml">Place</div></div><div><div class="pc-mv">150</div><div class="pc-ml">Participants</div></div><div><div class="pc-mv">10h</div><div class="pc-ml">Non-stop</div></div></div></div></div><div class="pc"><div class="pc-h"><div class="pc-n">Hack'Europe</div><div class="pc-t">February 2026</div></div><div class="pc-b"><p class="pc-d">Paris-Saclay. One of the biggest student hackathons in Europe. Continued developing 20n concepts. Networking with other builders and researchers.</p></div></div><p class="rs">Strategy: pick a bold idea, build a working demo, tell a compelling story in the pitch. Hackathons are the best way to learn under pressure, meet people, and validate ideas fast.</p><p class="rs">Planning to do more. Would recommend hackathons to anyone — they force you to ship.</p>`,n:["Tell me about PAACT","All projects","His journey"]},fr:{q:"Hackathons & compétitions",h:`<div class="rt">Compétir sous pression.</div><div class="pc"><div class="pc-h"><div class="pc-n">Innov Hack Paris</div><div class="pc-t">Janvier 2026</div></div><div class="pc-b"><p class="pc-d"><strong>Vainqueur — 1ère place</strong> parmi 150 participants. 10 heures non-stop. Présentation du cerveau universel 20n. PAACT est né ici. Équipe de 4.</p><div class="pc-m"><div><div class="pc-mv">1er</div><div class="pc-ml">Place</div></div><div><div class="pc-mv">150</div><div class="pc-ml">Participants</div></div><div><div class="pc-mv">10h</div><div class="pc-ml">Non-stop</div></div></div></div></div><div class="pc"><div class="pc-h"><div class="pc-n">Hack'Europe</div><div class="pc-t">Février 2026</div></div><div class="pc-b"><p class="pc-d">Paris-Saclay. Un des plus grands hackathons étudiants d'Europe. Développement des concepts 20n.</p></div></div><p class="rs">Stratégie : idée audacieuse, démo qui marche, storytelling au pitch. Les hackathons sont le meilleur moyen d'apprendre sous pression.</p>`,n:["Parle-moi de PAACT","Tous les projets","Son parcours complet"]}},

stack:{en:{q:"Tech stack",h:`<div class="rt">Tools & skills.</div><div class="ss"><div class="ss-l">AI & Robotics</div><div class="sg"><span class="stag">Liquid Neural Networks</span><span class="stag">Active Inference</span><span class="stag">PyTorch</span><span class="stag">MuJoCo</span><span class="stag">Reinforcement Learning</span><span class="stag">Computational Neuroscience</span></div></div><div class="ss"><div class="ss-l">Languages</div><div class="sg"><span class="stag">Python</span><span class="stag">Swift</span><span class="stag">JavaScript</span><span class="stag">TypeScript</span><span class="stag">HTML/CSS</span></div></div><div class="ss"><div class="ss-l">Mobile</div><div class="sg"><span class="stag">Swift</span><span class="stag">SwiftUI</span><span class="stag">iOS</span><span class="stag">Core Data</span><span class="stag">Xcode</span></div></div><div class="ss"><div class="ss-l">Web & Infra</div><div class="sg"><span class="stag">React</span><span class="stag">Node.js</span><span class="stag">Docker</span><span class="stag">Linux</span><span class="stag">Git</span><span class="stag">Vercel</span><span class="stag">VS Code</span></div></div><div class="ss"><div class="ss-l">Business</div><div class="sg"><span class="stag">E-commerce</span><span class="stag">Digital Marketing</span><span class="stag">Prospecting</span><span class="stag">Project Management</span></div></div><div class="ss"><div class="ss-l">Languages spoken</div><div class="sg"><span class="stag">French (native)</span><span class="stag">English (B2)</span><span class="stag">German (B1)</span></div></div><p class="rs">Favorite language: <strong>Python</strong> for AI/research, <strong>Swift</strong> for mobile. Uses <strong>VS Code</strong> + <strong>Xcode</strong>. Dark mode always. No TensorFlow — <strong>PyTorch only</strong>. Knows React but prefers vanilla JS for simple sites (like this one).</p>`,n:["All projects","Who is Nicolas?","Contact"]},fr:{q:"Compétences techniques",h:`<div class="rt">Outils & compétences.</div><div class="ss"><div class="ss-l">IA & Robotique</div><div class="sg"><span class="stag">Liquid Neural Networks</span><span class="stag">Active Inference</span><span class="stag">PyTorch</span><span class="stag">MuJoCo</span><span class="stag">Reinforcement Learning</span><span class="stag">Neurosciences computationnelles</span></div></div><div class="ss"><div class="ss-l">Langages</div><div class="sg"><span class="stag">Python</span><span class="stag">Swift</span><span class="stag">JavaScript</span><span class="stag">TypeScript</span><span class="stag">HTML/CSS</span></div></div><div class="ss"><div class="ss-l">Mobile</div><div class="sg"><span class="stag">Swift</span><span class="stag">SwiftUI</span><span class="stag">iOS</span><span class="stag">Core Data</span><span class="stag">Xcode</span></div></div><div class="ss"><div class="ss-l">Web & Infra</div><div class="sg"><span class="stag">React</span><span class="stag">Node.js</span><span class="stag">Docker</span><span class="stag">Linux</span><span class="stag">Git</span><span class="stag">Vercel</span><span class="stag">VS Code</span></div></div><div class="ss"><div class="ss-l">Business</div><div class="sg"><span class="stag">E-commerce</span><span class="stag">Marketing digital</span><span class="stag">Prospection</span><span class="stag">Gestion de projet</span></div></div><div class="ss"><div class="ss-l">Langues parlées</div><div class="sg"><span class="stag">Français (natif)</span><span class="stag">Anglais (B2)</span><span class="stag">Allemand (B1)</span></div></div><p class="rs">Langage préféré : <strong>Python</strong> pour l'IA, <strong>Swift</strong> pour le mobile. Utilise <strong>VS Code</strong> + <strong>Xcode</strong>. Dark mode toujours. <strong>PyTorch only</strong>.</p>`,n:["Tous les projets","Qui est Nicolas ?","Contact"]}},

investors:{en:{q:"Investors & interest",h:`<div class="rt">Who's paying attention.</div><p class="rs">20n is attracting interest from serious players:</p><div class="tl"><div class="tl-y now">Active</div><div class="tl-t"><strong>J12 Ventures</strong> — French VC fund focused on deep tech and early stage.</div></div><div class="tl"><div class="tl-y now">Active</div><div class="tl-t"><strong>Plug and Play</strong> — Global accelerator/VC platform. One of the most active investors in the world. 60,000+ startups network.</div></div><div class="tl"><div class="tl-y now">Active</div><div class="tl-t"><strong>MIT Professors</strong> — Researchers interested in the biomimetic architecture and Active Inference approach to robotics.</div></div><p class="rs"><strong>Status</strong>: Not yet formally raised. Bootstrapped. Conversation phase. No formal accelerator program. Haven't applied to YC yet — possible in the future.</p><p class="rs"><strong>Not hiring yet</strong> (solo founder). Open to exceptional people: researchers, engineers, co-founders. Open to interns. Email contact@20n.dev.</p><p class="rs">No pitch deck publicly available. Runway: bootstrapped, minimal costs (research + laptop).</p>`,n:["20n business model","Tell me about 20n","Contact"]},fr:{q:"Investisseurs & intérêt",h:`<div class="rt">Qui s'intéresse.</div><p class="rs">20n attire l'attention de :</p><div class="tl"><div class="tl-y now">Actif</div><div class="tl-t"><strong>J12 Ventures</strong> — Fonds VC français, deep tech, early stage.</div></div><div class="tl"><div class="tl-y now">Actif</div><div class="tl-t"><strong>Plug and Play</strong> — Accélérateur/VC mondial. Un des investisseurs les plus actifs au monde.</div></div><div class="tl"><div class="tl-y now">Actif</div><div class="tl-t"><strong>Professeurs du MIT</strong> — Chercheurs intéressés par l'architecture biomimétique et l'Active Inference.</div></div><p class="rs"><strong>Statut</strong> : Pas encore levé. Bootstrappé. Phase de discussion. Pas encore candidaté à YC.</p><p class="rs"><strong>Pas encore en recrutement</strong> (fondateur solo). Ouvert aux profils exceptionnels : chercheurs, ingénieurs, cofondateurs, stagiaires. Email contact@20n.dev.</p>`,n:["Business model 20n","Parle-moi de 20n","Contact"]}},

education:{en:{q:"Self-taught learning",h:`<div class="rt">No degree. No bootcamp. Just building.</div><p class="rs">100% self-taught. No CS degree, no formal education in programming or AI. Started at 16 with YouTube Python tutorials, then learned by <strong>building things</strong>.</p><p class="rs"><strong>How he learned each skill:</strong></p><p class="rs">• <strong>Python</strong>: YouTube tutorials → trading bots (2023)<br>• <strong>JavaScript/React</strong>: needed it for freelance web dev (2023-24)<br>• <strong>Swift/SwiftUI</strong>: learned for PAACT in 7 days (Jan 2026)<br>• <strong>ML/RL</strong>: online courses, PyTorch docs, building NERVE & Eve (2025)<br>• <strong>Computational neuroscience</strong>: academic papers (Friston, Hasani), arXiv, for 20n (2025-26)</p><p class="rs">Resources: YouTube, official docs, GitHub repos, arXiv papers, Stack Overflow, and most importantly — <strong>building projects</strong>.</p><p class="rs">Follows Karl Friston's work closely. Hasn't met him in person yet. No published papers yet but plans to publish 20n research.</p><div class="rq">A degree is not necessary in tech. Building things teaches more than lectures. But academia has its place for fundamental research.</div><p class="rs">Still learning constantly. Currently deep in <strong>control theory and computational neuroscience</strong>. Stays up to date by reading papers and building.</p>`,n:["His journey","What's his stack?","Philosophy & vision"]},fr:{q:"Apprentissage autodidacte",h:`<div class="rt">Pas de diplôme. Pas de bootcamp. Que du build.</div><p class="rs">100% autodidacte. Pas de diplôme en informatique. A commencé à 16 ans avec des tutos Python sur YouTube, puis a appris en <strong>construisant</strong>.</p><p class="rs"><strong>Comment il a appris :</strong></p><p class="rs">• <strong>Python</strong> : YouTube → bots de trading (2023)<br>• <strong>JavaScript/React</strong> : pour le freelance web (2023-24)<br>• <strong>Swift/SwiftUI</strong> : appris pour PAACT en 7 jours (Jan 2026)<br>• <strong>ML/RL</strong> : cours en ligne, docs PyTorch, NERVE & Eve (2025)<br>• <strong>Neurosciences computationnelles</strong> : papers académiques, arXiv, pour 20n (2025-26)</p><p class="rs">Ressources : YouTube, documentation officielle, GitHub, arXiv, Stack Overflow, et surtout — <strong>construire des projets</strong>.</p><div class="rq">Un diplôme n'est pas nécessaire en tech. Construire enseigne plus que les cours. Mais le monde académique a sa place pour la recherche fondamentale.</div><p class="rs">Apprend encore constamment. Actuellement : <strong>théorie du contrôle et neurosciences computationnelles</strong>.</p>`,n:["Son parcours complet","Ses compétences","Philosophie & vision"]}},

personal:{en:{q:"Personal life",h:`<div class="rt">The human behind the code.</div><p class="rs"><strong>Daily life</strong>: No strict routine — follows energy and curiosity. Codes a lot. Works from home and various spots in Paris. Night owl — often codes until 3am.</p><p class="rs"><strong>Setup</strong>: MacBook Pro. VS Code + Xcode. iPhone. Dark mode. Nothing fancy — the work matters more than the setup.</p><p class="rs"><strong>Social media</strong>: GitHub (<a href="https://github.com/Nick0-ai" target="_blank" style="color:#0a0a0a">Nick0-ai</a>) is the main presence. Not very active on Twitter/LinkedIn/Instagram. Prefers building to posting.</p><p class="rs"><strong>Paris</strong>: Lives in Paris. Likes the city — good ecosystem, good energy. Open to moving eventually (US for fundraising/scaling).</p><p class="rs"><strong>Hobbies</strong>: Honestly, building things IS the hobby. Used to swim competitively for 12 years. Doesn't game much, doesn't watch much anime/TV. Reads papers and docs for fun.</p><p class="rs"><strong>Personality</strong>: Introvert who can switch to extrovert mode for hackathons and pitching. Obsessive when locked on a project. Curious about everything.</p>`,n:["His swimming career","His journey","Contact"]},fr:{q:"Vie personnelle",h:`<div class="rt">L'humain derrière le code.</div><p class="rs"><strong>Quotidien</strong> : Pas de routine stricte — suit l'énergie et la curiosité. Code beaucoup. Travaille de chez lui ou divers endroits à Paris. Couche-tard — code souvent jusqu'à 3h du mat.</p><p class="rs"><strong>Setup</strong> : MacBook Pro. VS Code + Xcode. iPhone. Dark mode. Rien de fancy.</p><p class="rs"><strong>Réseaux sociaux</strong> : GitHub (<a href="https://github.com/Nick0-ai" target="_blank" style="color:#0a0a0a">Nick0-ai</a>) est la présence principale. Pas très actif sur Twitter/LinkedIn/Instagram. Préfère construire que poster.</p><p class="rs"><strong>Paris</strong> : Vit à Paris. Aime la ville. Ouvert à bouger un jour (US pour fundraising/scaling).</p><p class="rs"><strong>Hobbies</strong> : Construire des trucs EST le hobby. A nagé en compétition 12 ans. Lit des papers pour le plaisir.</p><p class="rs"><strong>Personnalité</strong> : Introverti qui peut passer en mode extraverti pour les hackathons et pitchs. Obsessionnel quand il est sur un projet.</p>`,n:["Sa carrière en natation","Son parcours complet","Contact"]}},

swimming:{en:{q:"Competitive swimming",h:`<div class="rt">12 years in the water.</div><p class="rs">Swam competitively from <strong>2012 to 2024</strong> — 12 years in club, since age 6. Regional competitions. Not Olympic level but serious commitment: training multiple times a week, early mornings, competitions on weekends.</p><div class="rq">What swimming taught: discipline, mental toughness, consistency. Showing up every day even when you don't want to. Pushing through pain. That same mentality now drives building companies.</div><p class="rs">Stopped in 2024 to focus fully on entrepreneurship and tech. Still exercises but no longer competes.</p><p class="rs">The transition from sports to tech was natural — same obsessive focus, different arena.</p>`,n:["His journey","Who is Nicolas?","Personal life"]},fr:{q:"Natation en compétition",h:`<div class="rt">12 ans dans l'eau.</div><p class="rs">A nagé en compétition de <strong>2012 à 2024</strong> — 12 ans en club, depuis l'âge de 6 ans. Compétitions régionales. Pas niveau olympique mais engagement sérieux.</p><div class="rq">Ce que la natation a enseigné : discipline, mental, régularité. Se lever tôt, s'entraîner même quand on n'a pas envie. Repousser ses limites. La même mentalité qui drive la construction d'entreprises.</div><p class="rs">Arrêté en 2024 pour se consacrer à l'entrepreneuriat et la tech. Fait encore du sport mais ne compétit plus.</p>`,n:["Son parcours complet","Qui est Nicolas ?","Vie personnelle"]}},

philosophy:{en:{q:"Philosophy & vision",h:`<div class="rt">What he believes.</div><p class="rs"><strong>On AI</strong>: The current paradigm (scale everything, more data, more compute) is hitting a wall. You can't brute-force infinity. <strong>Architecture matters more than data.</strong></p><p class="rs"><strong>On biomimetics</strong>: The brain is proof that general intelligence runs on 20 watts. If we model the architecture correctly, we don't need GPU clusters.</p><p class="rs"><strong>On AGI</strong>: It won't come from making GPT bigger. It'll come from understanding how biological intelligence actually works. 20n is a step in that direction.</p><p class="rs"><strong>On robots</strong>: Every home will have a humanoid robot eventually. But they need real brains, not text predictors strapped to actuators.</p><div class="rq">The biggest problem in AI isn't compute — it's that we're solving the wrong problem. We don't need better pattern matching. We need systems that understand physics, predict consequences, and adapt in real time. Like a brain.</div><p class="rs"><strong>On France</strong>: Good for deep tech startups. Strong research culture, Station F, good talent. But US has more capital for scaling.</p><p class="rs"><strong>Role models</strong>: Karl Friston (neuroscience), Radu Hasani (Liquid NNs at MIT), anyone who ships relentlessly.</p><p class="rs"><strong>Hot take</strong>: Most AI startups are wrappers around APIs. Real innovation requires going deeper.</p><p class="rs"><strong>On failure</strong>: Not afraid. Every project teaches something. GlowGum "failed" but taught business. Friday "stopped" but led to 20n. If 20n fails: start something else. The drive is about building, not any specific company.</p><p class="rs"><strong>Success</strong> = building something that changes how machines interact with the physical world.</p>`,n:["Tell me about 20n","His journey","Contact"]},fr:{q:"Philosophie & vision",h:`<div class="rt">Ce qu'il croit.</div><p class="rs"><strong>Sur l'IA</strong> : Le paradigme actuel (tout scaler, plus de données, plus de compute) atteint ses limites. On ne peut pas brute-forcer l'infini. <strong>L'architecture compte plus que les données.</strong></p><p class="rs"><strong>Sur le biomimétisme</strong> : Le cerveau est la preuve que l'intelligence générale tourne à 20 watts. Si on modélise bien l'architecture, on n'a pas besoin de clusters GPU.</p><p class="rs"><strong>Sur l'AGI</strong> : Elle ne viendra pas en rendant GPT plus gros. Elle viendra de la compréhension du fonctionnement réel de l'intelligence biologique.</p><div class="rq">Le plus gros problème de l'IA n'est pas le compute — c'est qu'on résout le mauvais problème. On n'a pas besoin de meilleur pattern matching. On a besoin de systèmes qui comprennent la physique et s'adaptent en temps réel.</div><p class="rs"><strong>Sur la France</strong> : Bien pour les startups deep tech. Bonne culture recherche, bon talent. Mais les US ont plus de capital.</p><p class="rs"><strong>Modèles</strong> : Karl Friston, Radu Hasani, tous ceux qui shippent sans relâche.</p><p class="rs"><strong>Hot take</strong> : La plupart des startups IA sont des wrappers autour d'APIs. La vraie innovation demande d'aller plus profond.</p><p class="rs"><strong>Sur l'échec</strong> : Pas peur. Chaque projet enseigne. GlowGum a appris le business. Friday a mené à 20n. Si 20n échoue : recommencer autre chose.</p><p class="rs"><strong>Succès</strong> = construire quelque chose qui change comment les machines interagissent avec le monde physique.</p>`,n:["Parle-moi de 20n","Son parcours complet","Contact"]}},

contact:{en:{q:"Contact",h:`<div class="cc"><h2>Let's talk.</h2><p class="rs" style="text-align:center;margin-bottom:24px">Building something ambitious? Interested in 20n? Investor? Researcher? Want to collaborate?</p><a href="mailto:contact@20n.dev" class="cc-btn">contact@20n.dev</a><div class="cc-lk"><a href="https://github.com/Nick0-ai" target="_blank">GitHub</a><a href="https://20n.dev" target="_blank">20n.dev</a></div></div><p class="rs" style="text-align:center;margin-top:16px">Replies to emails, usually within a few days. Email is the best way to reach him. Open to calls/meetings if relevant. Available for talks and events. Not doing freelance/consulting anymore — 100% focused on 20n.</p>`,n:["Who is Nicolas?","Tell me about 20n","All projects"]},fr:{q:"Contact",h:`<div class="cc"><h2>Parlons.</h2><p class="rs" style="text-align:center;margin-bottom:24px">Un projet ambitieux ? Intéressé par 20n ? Investisseur ? Chercheur ? Envie de collaborer ?</p><a href="mailto:contact@20n.dev" class="cc-btn">contact@20n.dev</a><div class="cc-lk"><a href="https://github.com/Nick0-ai" target="_blank">GitHub</a><a href="https://20n.dev" target="_blank">20n.dev</a></div></div><p class="rs" style="text-align:center;margin-top:16px">Répond aux emails en quelques jours. L'email est le meilleur moyen de le contacter. Ouvert aux calls/meetings si pertinent. Disponible pour des talks. Ne fait plus de freelance — 100% focus 20n.</p>`,n:["Qui est Nicolas ?","Parle-moi de 20n","Tous les projets"]}},

meta:{en:{q:"About this website",h:`<div class="rt">This is a ChatWeb.</div><p class="rs">An interactive chat-based portfolio. <strong>NOT a real AI</strong> — it's a pre-programmed keyword matching system with rich UI responses. Built with vanilla HTML/CSS/JS, no frameworks, no backend, no database.</p><p class="rs">Why a chat interface: because a portfolio should be a <strong>conversation, not a brochure</strong>. You ask what you want to know, you get exactly that. More engaging than scrolling through static sections.</p><p class="rs">Built entirely by Nicolas. Not a template. Not open source (yet). Runs on Vercel via <strong>nick0.xyz</strong>.</p><p class="rs"><strong>Privacy</strong>: conversations are NOT stored. No analytics. No cookies. Fully client-side. Everything runs in your browser.</p><p class="rs">The responses are hand-written, not AI-generated. If it doesn't understand your question, try rephrasing — it matches keywords, not meaning.</p><p class="rs">Inspired by ChatGPT's UX but with pre-written responses instead of a language model. Could you build something like this? Absolutely — it's just HTML, CSS, and JavaScript.</p>`,n:["Who is Nicolas?","Tell me about 20n","Contact"]},fr:{q:"À propos de ce site",h:`<div class="rt">Ceci est un ChatWeb.</div><p class="rs">Un portfolio interactif basé sur le chat. <strong>PAS une vraie IA</strong> — c'est un système de correspondance par mots-clés avec des réponses UI riches. HTML/CSS/JS vanilla, pas de framework, pas de backend.</p><p class="rs">Pourquoi une interface chat : parce qu'un portfolio devrait être une <strong>conversation, pas une brochure</strong>. Tu demandes ce que tu veux savoir, tu obtiens exactement ça.</p><p class="rs">Construit entièrement par Nicolas. Pas un template. Hébergé sur Vercel via <strong>nick0.xyz</strong>.</p><p class="rs"><strong>Vie privée</strong> : les conversations ne sont PAS stockées. Pas d'analytics. Pas de cookies. 100% client-side.</p><p class="rs">Les réponses sont écrites à la main, pas générées par IA. Si ça ne comprend pas ta question, reformule — ça matche des mots-clés, pas du sens.</p>`,n:["Qui est Nicolas ?","Parle-moi de 20n","Contact"]}},

const CM_FR={"Qui est Nicolas ?":"who","Parle-moi de 20n":"20n","Détails techniques":"20n_tech","C'est quoi l'Active Inference ?":"active_inference","Comparaison industrie":"compare","Résultats":"results","Business model 20n":"20n_business","Parle-moi de Friday":"friday","NERVE & Eve":"nerve","Parle-moi de PAACT":"paact","L'histoire GlowGum":"glowgum","Ses débuts en freelance":"freelance","Tous les projets":"projects","Son parcours complet":"journey","Son parcours entrepreneurial":"entrepreneurship","Les hackathons":"hackathons","Ses compétences":"stack","Les investisseurs":"investors","Comment il a appris":"education","Vie personnelle":"personal","Sa carrière en natation":"swimming","Philosophie & vision":"philosophy","Contact":"contact","À propos du site":"meta","Fun facts":"fun"};

// ===== DOM =====
const feed=document.getElementById("feed"),conv=document.getElementById("conv"),welcome=document.getElementById("welcome"),tw=document.getElementById("tw"),sug=document.getElementById("sug"),inp=document.getElementById("inp"),snd=document.getElementById("snd");
let started=false,busy=false;

function typewrite(){const text="What do you want to know about Nicolas?";let i=0;const cur=document.createElement("span");cur.className="w-cursor";tw.appendChild(cur);function tick(){if(i<text.length){const t=text.slice(0,i+1).replace("Nicolas","<strong>Nicolas</strong>");tw.innerHTML=t;tw.appendChild(cur);i++;setTimeout(tick,35+Math.random()*25)}else{renderSug(["Who is Nicolas?","Tell me about 20n","All projects","Contact"])}}setTimeout(tick,500)}

function renderSug(labels){sug.innerHTML="";labels.forEach((l,i)=>{const b=document.createElement("button");b.className="chip";b.textContent=l;b.style.opacity="0";b.style.transform="translateY(4px)";b.style.transition="all 0.2s ease";b.onclick=()=>go(l);sug.appendChild(b);setTimeout(()=>{b.style.opacity="1";b.style.transform="translateY(0)"},50+i*50)})}

function go(text){if(busy||!text.trim())return;busy=true;if(!started){welcome.classList.add("out");started=true}detectLang(text);const um=document.createElement("div");um.className="msg-user";um.innerHTML=`<div class="msg-user-text">${esc(text)}</div>`;conv.appendChild(um);inp.value="";sug.innerHTML="";const cm=lang==="fr"?CM_FR:CM_EN;const id=cm[text]||match(text);const data=(R[id]||R.fallback)[lang]||(R[id]||R.fallback).en;const dots=document.createElement("div");dots.className="typing";dots.innerHTML="<i></i><i></i><i></i>";conv.appendChild(dots);scrollDown();setTimeout(()=>{dots.remove();const block=document.createElement("div");block.className="msg-res";block.innerHTML=data.h;conv.appendChild(block);setTimeout(scrollDown,30);setTimeout(()=>{renderSug(data.n||[]);busy=false},300)},500+Math.random()*300)}

function scrollDown(){feed.scrollTo({top:feed.scrollHeight,behavior:"smooth"})}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

inp.addEventListener("keydown",e=>{if(e.key==="Enter")go(inp.value)});
snd.addEventListener("click",()=>go(inp.value));
typewrite();
inp.focus();
</script>
