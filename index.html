<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nicolas PHILIPPE</title>
<meta name="description" content="19. Paris. Building the universal brain for robots.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>N</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
    background:#fff;color:#0a0a0a;
    font-family:'Inter',-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
}

/* === LAYOUT === */
#app{height:100dvh;display:flex;flex-direction:column}
#feed{
    flex:1;overflow-y:auto;
    padding:0 20px 20px;
    overscroll-behavior:contain;
}
#feed::-webkit-scrollbar{width:4px}
#feed::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px}

/* === WELCOME === */
#welcome{
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100%;text-align:center;
    padding:0 20px 100px;
    transition:all 0.5s cubic-bezier(.4,0,.2,1);
}
#welcome.out{opacity:0;transform:scale(0.98);pointer-events:none;position:absolute}
.w-dot{
    width:6px;height:6px;border-radius:50%;
    background:#0a0a0a;margin-bottom:32px;
    opacity:0;animation:dotIn 0.4s ease 0.2s forwards;
}
@keyframes dotIn{to{opacity:1}}
.w-title{
    font-size:clamp(22px,4vw,36px);
    font-weight:300;line-height:1.4;
    letter-spacing:-0.02em;
    max-width:480px;
    color:#0a0a0a;
}
.w-title strong{font-weight:600}
.w-cursor{
    display:inline-block;width:1.5px;height:0.95em;
    background:#0a0a0a;margin-left:1px;
    vertical-align:text-bottom;
    animation:blink 1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0}}

/* === CONVERSATION === */
#conv{max-width:680px;margin:0 auto;width:100%}

/* user bubble */
.msg-user{
    display:flex;justify-content:flex-end;
    margin-bottom:8px;
    opacity:0;transform:translateY(8px);
    animation:fadeUp 0.3s ease forwards;
}
.msg-user-text{
    font-size:14px;color:#fff;
    background:#0a0a0a;
    padding:10px 18px;
    border-radius:20px 20px 4px 20px;
    max-width:80%;line-height:1.5;
}

/* response container */
.msg-res{
    margin:16px 0 32px;
    opacity:0;transform:translateY(12px);
    animation:fadeUp 0.4s ease forwards;
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* typing */
.typing{display:flex;gap:5px;padding:16px 0;align-items:center}
.typing i{
    width:5px;height:5px;border-radius:50%;
    background:#bbb;display:block;
    animation:pulse 1s ease infinite;
}
.typing i:nth-child(2){animation-delay:0.15s}
.typing i:nth-child(3){animation-delay:0.3s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.85)}40%{opacity:1;transform:scale(1)}}

/* === RICH COMPONENTS === */

/* headings */
.rh{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:#999;
    text-transform:uppercase;letter-spacing:0.12em;
    margin-bottom:16px;
}
.rt{
    font-size:clamp(20px,3vw,30px);
    font-weight:700;letter-spacing:-0.025em;
    line-height:1.2;margin-bottom:14px;
}
.rs{font-size:14px;color:#666;line-height:1.8;margin-bottom:14px}
.rs:last-child{margin-bottom:0}
.rs strong{color:#0a0a0a;font-weight:600}
.rq{
    font-size:15px;color:#0a0a0a;line-height:1.7;
    border-left:2px solid #0a0a0a;
    padding:2px 0 2px 18px;margin:20px 0;
}

/* stats row */
.stats{
    display:flex;gap:28px;flex-wrap:wrap;
    padding:18px 0;margin:16px 0;
    border-top:1px solid #eee;border-bottom:1px solid #eee;
}
.st-v{font-family:'JetBrains Mono',monospace;font-size:clamp(22px,3vw,32px);font-weight:700;line-height:1}
.st-l{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}

/* project card */
.pc{border:1px solid #eee;margin-bottom:12px;transition:border-color 0.15s}
.pc:hover{border-color:#ccc}
.pc-h{padding:20px 22px;display:flex;justify-content:space-between;align-items:start;gap:16px}
.pc-n{font-size:clamp(17px,2.2vw,22px);font-weight:700;letter-spacing:-0.02em;line-height:1.2}
.pc-t{font-family:'JetBrains Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;padding-top:3px}
.pc-b{padding:0 22px 20px}
.pc-d{font-size:13px;color:#666;line-height:1.75}
.pc-m{display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid #eee}
.pc-mv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;display:block}
.pc-ml{font-family:'JetBrains Mono',monospace;font-size:9px;color:#999;text-transform:uppercase;letter-spacing:0.06em}
.pc-a{
    display:inline-block;margin-top:12px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:#0a0a0a;font-weight:500;
    text-decoration:none;letter-spacing:0.04em;
    padding:6px 14px;border:1px solid #eee;
    transition:all 0.15s;
}
.pc-a:hover{background:#0a0a0a;color:#fff}

/* stack */
.sg{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.stag{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;padding:6px 12px;
    border:1px solid #eee;color:#666;
    transition:all 0.15s;
}
.stag:hover{border-color:#0a0a0a;color:#0a0a0a}
.ss{margin-bottom:20px}
.ss-l{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px}

/* timeline */
.tl{display:grid;grid-template-columns:72px 1fr;gap:16px;padding:16px 0;border-bottom:1px solid #eee}
.tl:first-of-type{border-top:1px solid #eee}
.tl-y{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:#999;padding-top:2px}
.tl-y.now{background:#0a0a0a;color:#fff;padding:3px 0;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:0.1em}
.tl-t{font-size:13px;color:#666;line-height:1.7}
.tl-t strong{color:#0a0a0a}

/* contact */
.cc{text-align:center;padding:28px 0}
.cc h2{font-size:clamp(22px,3vw,32px);font-weight:700;letter-spacing:-0.02em;margin-bottom:12px}
.cc-btn{
    display:inline-block;padding:12px 36px;
    background:#0a0a0a;color:#fff;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;font-weight:500;
    text-decoration:none;letter-spacing:0.02em;
    transition:opacity 0.15s;
}
.cc-btn:hover{opacity:0.8}
.cc-lk{margin-top:20px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.cc-lk a{font-family:'JetBrains Mono',monospace;font-size:11px;color:#999;text-decoration:none;transition:color 0.15s}
.cc-lk a:hover{color:#0a0a0a}

/* compare */
.cmp{display:grid;grid-template-columns:1fr 1fr;border:1px solid #eee;margin:16px 0}
.cmp-c{padding:20px}
.cmp-c:first-child{border-right:1px solid #eee}
.cmp-h{font-family:'JetBrains Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #eee}
.cmp-i{font-size:13px;color:#666;line-height:2}

/* === BOTTOM BAR === */
#bar{
    background:#fff;
    padding:8px 20px max(16px, env(safe-area-inset-bottom));
    border-top:1px solid #eee;
    flex-shrink:0;
}
#sug{
    display:flex;gap:6px;flex-wrap:wrap;
    justify-content:center;margin-bottom:10px;
    min-height:30px;
}
.chip{
    font-family:'Inter',sans-serif;font-size:12px;
    color:#888;padding:6px 14px;
    border:1px solid #eee;border-radius:18px;
    background:#fff;cursor:pointer;
    transition:all 0.15s;white-space:nowrap;
}
.chip:hover{border-color:#0a0a0a;color:#0a0a0a}
#irow{display:flex;gap:10px;max-width:560px;margin:0 auto}
#inp{
    flex:1;font-family:'Inter',sans-serif;font-size:14px;
    padding:10px 18px;border:1px solid #eee;
    border-radius:24px;background:#fafafa;
    color:#0a0a0a;outline:none;transition:border-color 0.2s;
}
#inp:focus{border-color:#ccc}
#inp::placeholder{color:#bbb}
#snd{
    width:40px;height:40px;border:none;border-radius:50%;
    background:#0a0a0a;color:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:opacity 0.15s;flex-shrink:0;
}
#snd:hover{opacity:0.8}
#snd svg{width:16px;height:16px}

/* === RESPONSIVE === */
@media(max-width:640px){
    #feed{padding:0 14px 14px}
    #bar{padding:6px 14px max(12px,env(safe-area-inset-bottom))}
    .chip{font-size:11px;padding:5px 11px}
    .pc-h{flex-direction:column;gap:4px;padding:16px}
    .pc-b{padding:0 16px 16px}
    .pc-m{gap:12px}
    .cmp{grid-template-columns:1fr}
    .cmp-c:first-child{border-right:none;border-bottom:1px solid #eee}
    .tl{grid-template-columns:56px 1fr;gap:10px}
    .stats{gap:18px}
    .msg-user-text{max-width:90%}
}
</style>
</head>
<body>
<div id="app">
<div id="feed">
    <div id="welcome">
        <div class="w-dot"></div>
        <div class="w-title" id="tw"></div>
    </div>
    <div id="conv"></div>
</div>
<div id="bar">
    <div id="sug"></div>
    <div id="irow">
        <input type="text" id="inp" placeholder="Ask me anything..." autocomplete="off" spellcheck="false">
        <button id="snd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
    </div>
</div>
</div>
<script>
// ===== LANGUAGE DETECTION =====
let lang = "en";
const FR_WORDS = ["qui","est","quoi","comment","montre","projets","parcours","contact","parle","raconte","explique","dit","age","entrepren","compet","detail","bonjour","salut","moi","son","ses","les","des","une","pour","dans","avec","sur","aussi","tout","mais","plus","que","quel","cette","faire","voir","savoir","peut","sont","fait","entre","comme","autre","depuis"];

function detectLang(t) {
    const w = t.toLowerCase().split(/\s+/);
    let fr = 0;
    for (const word of w) { if (FR_WORDS.some(f => word.includes(f))) fr++; }
    if (fr >= 1) lang = "fr";
    else lang = "en";
    return lang;
}

// ===== RESPONSES =====
const R = {

who: {
    en: {
        q: "Who is Nicolas?",
        h: `<div style="margin-bottom:24px"><div class="rt" style="font-size:clamp(26px,4vw,38px)">Nicolas PHILIPPE</div><p class="rs" style="font-size:15px;max-width:500px">19 years old. French. Self-taught since 16. Founder of <strong>20n Research Laboratory</strong> — building the universal brain for robots from Paris.</p></div>
<div class="stats"><div><div class="st-v">19</div><div class="st-l">Age</div></div><div><div class="st-v">3 yrs</div><div class="st-l">Self-taught</div></div><div><div class="st-v">8+</div><div class="st-l">Projects</div></div><div><div class="st-v">Paris</div><div class="st-l">Based in</div></div></div>
<p class="rs">Started coding at 16 with Python and trading bots. No CS degree, no bootcamp — just obsessive curiosity. Went from selling websites to local businesses in Alsace to building a <strong>biomimetic brain architecture grounded in theoretical neuroscience</strong>.</p>
<p class="rs">His work at 20n is now attracting attention from <strong>J12 Ventures, Plug and Play, and MIT professors</strong>. Winner of Innov Hack Paris 2026 among 150 participants.</p>`,
        n: ["Tell me about 20n", "His full journey", "All projects", "Contact"]
    },
    fr: {
        q: "Qui est Nicolas ?",
        h: `<div style="margin-bottom:24px"><div class="rt" style="font-size:clamp(26px,4vw,38px)">Nicolas PHILIPPE</div><p class="rs" style="font-size:15px;max-width:500px">19 ans. Fran\u00e7ais. Autodidacte depuis 16 ans. Fondateur de <strong>20n Research Laboratory</strong> — construit le cerveau universel pour robots depuis Paris.</p></div>
<div class="stats"><div><div class="st-v">19</div><div class="st-l">Age</div></div><div><div class="st-v">3 ans</div><div class="st-l">Autodidacte</div></div><div><div class="st-v">8+</div><div class="st-l">Projets</div></div><div><div class="st-v">Paris</div><div class="st-l">Bas\u00e9 \u00e0</div></div></div>
<p class="rs">A commenc\u00e9 \u00e0 coder \u00e0 16 ans avec Python et des bots de trading. Pas de dipl\u00f4me, pas de bootcamp — juste une curiosit\u00e9 obsessionnelle. Pass\u00e9 de la vente de sites web pour PME en Alsace \u00e0 la construction d'une <strong>architecture c\u00e9r\u00e9brale biomim\u00e9tique fond\u00e9e sur les neurosciences th\u00e9oriques</strong>.</p>
<p class="rs">Son travail chez 20n attire d\u00e9sormais l'attention de <strong>J12 Ventures, Plug and Play et des professeurs du MIT</strong>. Vainqueur du Innov Hack Paris 2026 parmi 150 participants.</p>`,
        n: ["Parle-moi de 20n", "Son parcours complet", "Tous les projets", "Contact"]

    en: {
        q: "What is 20n?",
        h: `<div class="rh">Current focus — since January 2026</div>
<div class="rt">20n Research Laboratory</div>
<p class="rs">A universal artificial brain for humanoid robots. One architecture, grounded in theoretical neuroscience, that can control <strong>any robot body</strong>. No training, no cloud, no GPU. 20 watts.</p>
<div class="pc-m" style="border-top:1px solid #eee;padding-top:16px;margin:16px 0 20px"><div><div class="pc-mv">20W</div><div class="pc-ml">Power</div></div><div><div class="pc-mv">0</div><div class="pc-ml">Training steps</div></div><div><div class="pc-mv">1kHz</div><div class="pc-ml">Inference</div></div><div><div class="pc-mv">3</div><div class="pc-ml">Bodies tested</div></div></div>
<p class="rs">The architecture is <strong>biomimetic and hierarchical</strong> — modeled after the biological brain. Five layers working together:</p>
<p class="rs"><strong>Spinal Cord</strong> (1kHz) — hardwired reflexes and posture. <strong>Cerebellum</strong> (100Hz) — internal body model via forward simulation. <strong>Cortex</strong> (10Hz) — world model, learns online by minimizing prediction error. <strong>Hippocampus</strong> — episodic memory, retrieves by similarity. <strong>Basal Ganglia</strong> — action selection, chooses safest trajectory.</p>
<p class="rs">All unified by <strong>Active Inference</strong> (Karl Friston, 2010) — the Free Energy Principle. The brain predicts, acts, corrects. Continuously. No backpropagation. No training phase.</p>
<div class="rq">Drop it into a humanoid and it discovers how to balance. A quadruped and it learns to move. A body with 17 joints that has never existed in nature — and it figures it out. No retraining. The same brain.</div>
<p class="rs">Benchmarked on MuJoCo: <strong>Walker2d (max 1000), Ant (max 1000), Humanoid (474 and improving)</strong>. The same architecture that once controlled a Mac screen with Friday now controls physical robot bodies.</p>
<a href="https://20n.dev" class="pc-a" target="_blank" rel="noopener">20n.dev &rarr;</a>`,
        n: ["Show me results", "How does it compare?", "Who is Nicolas?"]
    },
    fr: {
        q: "C'est quoi 20n ?",
        h: `<div class="rh">Focus actuel — depuis janvier 2026</div>
<div class="rt">20n Research Laboratory</div>
<p class="rs">Un cerveau artificiel universel pour robots humano\u00efdes. Une seule architecture, fond\u00e9e sur les neurosciences th\u00e9oriques, capable de contr\u00f4ler <strong>n'importe quel corps robotique</strong>. Pas d'entra\u00eenement, pas de cloud, pas de GPU. 20 watts.</p>
<div class="pc-m" style="border-top:1px solid #eee;padding-top:16px;margin:16px 0 20px"><div><div class="pc-mv">20W</div><div class="pc-ml">Puissance</div></div><div><div class="pc-mv">0</div><div class="pc-ml">\u00c9tapes d'entra\u00eenement</div></div><div><div class="pc-mv">1kHz</div><div class="pc-ml">Inf\u00e9rence</div></div><div><div class="pc-mv">3</div><div class="pc-ml">Corps test\u00e9s</div></div></div>
<p class="rs">L'architecture est <strong>biomim\u00e9tique et hi\u00e9rarchique</strong> — model\u00e9e sur le cerveau biologique. Cinq couches :</p>
<p class="rs"><strong>Moelle \u00e9pini\u00e8re</strong> (1kHz) — r\u00e9flexes. <strong>Cervelet</strong> (100Hz) — mod\u00e8le corporel interne. <strong>Cortex</strong> (10Hz) — mod\u00e8le du monde, apprend en temps r\u00e9el. <strong>Hippocampe</strong> — m\u00e9moire \u00e9pisodique. <strong>Ganglions de la base</strong> — s\u00e9lection d'action.</p>
<p class="rs">Le tout unifi\u00e9 par l'<strong>Active Inference</strong> (Karl Friston, 2010). Le cerveau pr\u00e9dit, agit, corrige. En continu. Z\u00e9ro backpropagation. Z\u00e9ro phase d'entra\u00eenement.</p>
<div class="rq">Placez-le dans un humano\u00efde et il d\u00e9couvre comment tenir debout. Un quadrup\u00e8de et il apprend \u00e0 se d\u00e9placer. Le m\u00eame cerveau, z\u00e9ro r\u00e9entra\u00eenement.</div>

<a href="https://20n.dev" class="pc-a" target="_blank" rel="noopener">20n.dev &rarr;</a>`,
        n: ["R\u00e9sultats", "Comparaison avec l'industrie", "Qui est Nicolas ?"]

},

    en: {
        q: "Results & benchmarks",
        h: `<div class="rt">Same brain. Different bodies. Zero tuning.</div>

        n: ["Tell me about 20n", "All projects", "Contact"]
    },
    fr: {
        q: "R\u00e9sultats & benchmarks",

        h: `<div class="rt">I can tell you about...</div><p class="rs">Nicolas PHILIPPE, 19, Paris. Self-taught builder. Ask me about <strong>20n</strong> (the universal brain for robots), his <strong>projects</strong>, his <strong>entrepreneurial journey</strong> (from trading bots at 16 to robot brains at 19), his <strong>tech stack</strong>, or how to <strong>get in touch</strong>.</p>`,
        n: ["Who is Nicolas?", "Tell me about 20n", "All projects", "Contact"]
    },
    fr: {
        q: "Voici ce que je peux vous dire",
        h: `<div class="rt">Je peux vous parler de...</div><p class="rs">Nicolas PHILIPPE, 19 ans, Paris. Builder autodidacte. Demandez-moi des infos sur <strong>20n</strong> (le cerveau universel pour robots), ses <strong>projets</strong>, son <strong>parcours entrepreneurial</strong> (des bots de trading \u00e0 16 ans aux cerveaux de robots \u00e0 19), ses <strong>comp\u00e9tences</strong>, ou comment le <strong>contacter</strong>.</p>`,
        n: ["Qui est Nicolas ?", "Parle-moi de 20n", "Tous les projets", "Contact"]
    }
}

};

// ===== MATCHING =====
const M = [
    {k:["who","nick","nicolas","about","qui est","present","profil","bio","age","lui","himself"],id:"who"},
    {k:["20n","brain","robot","cerveau","lab","research","laborat","active inf","friston","liquid","biomim"],id:"20n"},
    {k:["compare","vs","tradition","different","paradigm","versus","industri"],id:"compare"},
    {k:["result","score","bench","walker","ant","humanoid","proof","preuve","mujoco"],id:"results"},
    {k:["project","work","portfolio","built","ship","projets","tous","travaux","all","r\u00e9alis"],id:"projects"},
    {k:["friday","mac","agent","screen","\u00e9cran"],id:"projects"},
    {k:["stack","tech","tool","language","skill","comp\u00e9t","outil"],id:"stack"},
    {k:["timeline","path","history","parcours","journey","story","histoir","trajet","chemin","full jour"],id:"journey"},
    {k:["contact","email","mail","reach","talk","hire","parler","touch","joindre"],id:"contact"},
    {k:["nerve","eve","finops","greenops","wattless","gpu"],id:"projects"},
    {k:["paact","pact","commitment","engage","hackathon","innov"],id:"projects"},
    {k:["entrepreneur","business","commerce","glow","gum","freelanc","trading","bot","pme","smb","non.tech","hors tech","venture","marque","brand"],id:"entrepreneurship"},
    {k:["swim","natat","sport","discipl"],id:"journey"},
    {k:["hack","compet","concour","innov hack"],id:"journey"},
];

function match(q) {
    const l = q.toLowerCase();
    for (const m of M) { for (const k of m.k) { if (l.includes(k)) return m.id; } }
    return "fallback";
}

// Chip map
const CM_EN = {"Who is Nicolas?":"who","Tell me about 20n":"20n","How does it compare?":"compare","Show me results":"results","All projects":"projects","His full journey":"journey","His entrepreneurial arc":"entrepreneurship","What's his stack?":"stack","Contact":"contact"};
const CM_FR = {"Qui est Nicolas ?":"who","Parle-moi de 20n":"20n","Comparaison avec l'industrie":"compare","R\u00e9sultats":"results","Tous les projets":"projects","Son parcours complet":"journey","Son parcours entrepreneurial":"entrepreneurship","Ses comp\u00e9tences":"stack","Contact":"contact"};

// ===== DOM =====
const feed = document.getElementById("feed");
const conv = document.getElementById("conv");
const welcome = document.getElementById("welcome");
const tw = document.getElementById("tw");
const sug = document.getElementById("sug");
const inp = document.getElementById("inp");
const snd = document.getElementById("snd");
let started = false, busy = false;

// Typewriter
function typewrite() {
    const text = "What do you want to know about Nicolas?";
    let i = 0;
    const cur = document.createElement("span");
    cur.className = "w-cursor";
    tw.appendChild(cur);
    function tick() {
        if (i < text.length) {
            const t = text.slice(0, i + 1).replace("Nicolas", "<strong>Nicolas</strong>");
            tw.innerHTML = t;
            tw.appendChild(cur);
            i++;
            setTimeout(tick, 35 + Math.random() * 25);
        } else {
            renderSug(["Who is Nicolas?", "Tell me about 20n", "All projects", "Contact"]);
        }
    }
    setTimeout(tick, 500);
}

// Suggestions
function renderSug(labels) {
    sug.innerHTML = "";
    labels.forEach((l, i) => {
        const b = document.createElement("button");
        b.className = "chip";
        b.textContent = l;
        b.style.opacity = "0";
        b.style.transform = "translateY(4px)";
        b.style.transition = "all 0.2s ease";
        b.onclick = () => go(l);
        sug.appendChild(b);
        setTimeout(() => { b.style.opacity = "1"; b.style.transform = "translateY(0)"; }, 50 + i * 50);
    });
}

// Main handler
function go(text) {
    if (busy || !text.trim()) return;
    busy = true;
    if (!started) { welcome.classList.add("out"); started = true; }

    // Detect language
    detectLang(text);

    // Show user message
    const um = document.createElement("div");
    um.className = "msg-user";
    um.innerHTML = `<div class="msg-user-text">${esc(text)}</div>`;
    conv.appendChild(um);
    inp.value = "";
    sug.innerHTML = "";

    // Resolve
    const cm = lang === "fr" ? CM_FR : CM_EN;
    const id = cm[text] || match(text);
    const data = (R[id] || R.fallback)[lang] || (R[id] || R.fallback).en;

    // Typing dots
    const dots = document.createElement("div");
    dots.className = "typing";
    dots.innerHTML = "<i></i><i></i><i></i>";
    conv.appendChild(dots);
    scrollDown();

    setTimeout(() => {
        dots.remove();
        const block = document.createElement("div");
        block.className = "msg-res";
        block.innerHTML = data.h;
        conv.appendChild(block);
        setTimeout(scrollDown, 30);
        setTimeout(() => {
            renderSug(data.n || []);
            busy = false;
        }, 300);
    }, 500 + Math.random() * 300);
}

function scrollDown() { feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" }); }
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// Events
inp.addEventListener("keydown", e => { if (e.key === "Enter") go(inp.value); });
snd.addEventListener("click", () => go(inp.value));

// Init
typewrite();
inp.focus();
</script>
</body>
