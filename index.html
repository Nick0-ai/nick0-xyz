<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nick0</title>
<meta name="description" content="Ask me anything.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>N</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg: #fff;
    --text: #0a0a0a;
    --dim: #6b6b6b;
    --faint: #a0a0a0;
    --border: #e8e8e8;
    --card: #fafafa;
    --accent: #0a0a0a;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
}

/* === LAYOUT === */
#app {
    height: 100vh;
    display: flex;
    flex-direction: column;
}
#feed {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 24px;
    scroll-behavior: smooth;
}
#feed::-webkit-scrollbar { width: 6px; }
#feed::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

/* === WELCOME === */
#welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    text-align: center;
    padding: 40px 24px 120px;
    transition: opacity 0.4s ease;
}
#welcome.hidden { opacity: 0; pointer-events: none; position: absolute; }
.welcome-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-bottom: 20px;
}
.welcome-title {
    font-size: clamp(26px, 4.5vw, 42px);
    font-weight: 300;
    line-height: 1.3;
    letter-spacing: -0.02em;
    color: var(--text);
    max-width: 560px;
}
.welcome-title strong { font-weight: 600; }
.cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--text);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* === RESPONSES === */
.response-block {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 0;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.5s ease forwards;
}
.response-block + .response-block { border-top: 1px solid var(--border); }
@keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

/* user query echo */
.user-query {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
}

/* typing dots */
.typing {
    display: flex; gap: 6px; padding: 24px 0;
    max-width: 720px; margin: 0 auto;
}
.typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--faint);
    animation: typingDot 1.2s ease infinite;
}
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes typingDot { 0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }

/* === RICH UI COMPONENTS === */

/* -- Bio card -- */
.bio-hero { margin-bottom: 32px; }
.bio-hero h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 12px;
}
.bio-hero .tagline {
    font-size: 17px;
    color: var(--dim);
    line-height: 1.7;
    max-width: 520px;
}
.bio-stats {
    display: flex; gap: 32px; flex-wrap: wrap;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin: 24px 0;
}
.bio-stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 700;
    line-height: 1;
}
.bio-stat-label {
    font-size: 11px;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 6px;
}
.bio-text { font-size: 15px; color: var(--dim); line-height: 1.8; }
.bio-text strong { color: var(--text); font-weight: 600; }

/* -- Project card -- */
.proj-card {
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
}
.proj-card:hover { border-color: #ccc; }
.proj-header {
    padding: 28px;
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 20px;
}
.proj-name {
    font-size: clamp(20px, 2.5vw, 28px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
}
.proj-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    padding-top: 4px;
}
.proj-body {
    padding: 0 28px 28px;
}
.proj-desc { font-size: 14px; color: var(--dim); line-height: 1.75; }
.proj-metrics {
    display: flex; gap: 24px; flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
}
.proj-metric {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
}
.proj-metric strong { font-size: 18px; display: block; margin-bottom: 2px; color: var(--text); }
.proj-metric span { color: var(--faint); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }
.proj-link {
    display: inline-block;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.04em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    transition: all 0.15s;
}
.proj-link:hover { background: var(--text); color: var(--bg); }

/* -- Stack grid -- */
.stack-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
.stack-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    color: var(--dim);
    transition: all 0.15s;
}
.stack-tag:hover { border-color: var(--text); color: var(--text); }
.stack-section { margin-bottom: 24px; }
.stack-label {
    font-size: 11px;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
}

/* -- Timeline -- */
.tl-item {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 20px;
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
}
.tl-item:first-child { border-top: 1px solid var(--border); }
.tl-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--faint);
    padding-top: 2px;
}
.tl-year.now {
    background: var(--text); color: var(--bg);
    padding: 3px 0; text-align: center;
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em;
}
.tl-text { font-size: 14px; color: var(--dim); line-height: 1.7; }
.tl-text strong { color: var(--text); }

/* -- Contact card -- */
.contact-card { text-align: center; padding: 40px 0; }
.contact-card h2 {
    font-size: clamp(24px, 3.5vw, 36px);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
}
.contact-card .email-btn {
    display: inline-block;
    padding: 14px 40px;
    background: var(--text); color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
}
.contact-card .email-btn:hover { opacity: 0.8; }
.contact-links {
    margin-top: 24px;
    display: flex; gap: 24px; justify-content: center;
}
.contact-links a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--faint);
    text-decoration: none; transition: color 0.15s;
}
.contact-links a:hover { color: var(--text); }

/* -- Section heading in responses -- */
.r-heading {
    font-size: 13px;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
}
.r-title {
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 16px;
}
.r-text { font-size: 15px; color: var(--dim); line-height: 1.8; margin-bottom: 16px; }
.r-text:last-child { margin-bottom: 0; }
.r-quote {
    font-size: 17px; color: var(--text); line-height: 1.7;
    border-left: 3px solid var(--text);
    padding-left: 20px;
    margin: 24px 0;
    font-weight: 400;
}

/* === BOTTOM BAR === */
#bar {
    border-top: 1px solid var(--border);
    background: var(--bg);
    padding: 12px 24px 24px;
    flex-shrink: 0;
}
#suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 12px;
    min-height: 34px;
}
.chip {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--dim);
    padding: 7px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--bg);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}
.chip:hover { border-color: var(--text); color: var(--text); }
#input-row {
    display: flex;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto;
}
#input {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 12px 20px;
    border: 1px solid var(--border);
    border-radius: 28px;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
}
#input:focus { border-color: #bbb; }
#input::placeholder { color: var(--faint); }
#send {
    width: 44px; height: 44px;
    border: none;
    border-radius: 50%;
    background: var(--text);
    color: var(--bg);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
    flex-shrink: 0;
}
#send:hover { opacity: 0.8; }
#send svg { width: 18px; height: 18px; }

/* === RESPONSIVE === */
@media (max-width: 640px) {
    #feed { padding: 0 16px 16px; }
    #bar { padding: 10px 16px 20px; }
    #suggestions { gap: 6px; }
    .chip { font-size: 12px; padding: 6px 12px; }
    .bio-stats { gap: 20px; }
    .proj-header { flex-direction: column; gap: 8px; }
    .proj-metrics { gap: 16px; }
    .tl-item { grid-template-columns: 60px 1fr; gap: 12px; }
    .response-block { padding: 32px 0; }
    .contact-links { flex-wrap: wrap; }
}

@media (max-width: 380px) {
    .chip { font-size: 11px; padding: 5px 10px; }
    #input { font-size: 14px; padding: 10px 16px; }
}
</style>
</head>

// ===== KEYWORD MATCHING =====
const MATCHERS = [
    { keys: ["who", "nick", "about", "qui", "yourself", "bio", "him", "toi", "present"], id: "who" },
    { keys: ["20n", "brain", "robot", "cerveau", "lab", "research", "laboratory"], id: "20n" },
    { keys: ["compare", "vs", "traditional", "different", "paradigm", "versus"], id: "compare" },
    { keys: ["result", "score", "benchmark", "walker", "ant", "humanoid", "proof", "preuve"], id: "results" },
    { keys: ["project", "work", "portfolio", "built", "ship", "projets", "tous"], id: "projects" },
    { keys: ["friday", "mac", "agent", "screen"], id: "friday" },
    { keys: ["stack", "tech", "tool", "language", "skill", "compet"], id: "stack" },
    { keys: ["timeline", "path", "history", "parcours", "journey", "story", "histoire"], id: "timeline" },
    { keys: ["contact", "email", "mail", "reach", "talk", "hire", "parler"], id: "contact" },
    { keys: ["nerve", "eve", "finops", "greenops", "wattless", "gpu"], id: "projects" },
    { keys: ["paact", "pact", "commitment"], id: "projects" },
];

function matchQuery(q) {
    const lower = q.toLowerCase();
    for (const m of MATCHERS) {
        for (const k of m.keys) {
            if (lower.includes(k)) return m.id;
        }
    }
    return "who"; // default
}

// ===== SUGGESTION CHIP MAPPING =====
const CHIP_MAP = {
    "Who is Nick0?": "who",
    "Tell me about 20n": "20n",
    "How does it compare to others?": "compare",
    "Show me results": "results",
    "Show me all projects": "projects",
    "What was Friday?": "friday",
    "What's his stack?": "stack",
    "His timeline": "timeline",
    "Contact": "contact",
};

// ===== DOM =====
const feed = document.getElementById("feed");
const responses = document.getElementById("responses");
const welcome = document.getElementById("welcome");
const typewriterEl = document.getElementById("typewriter");
const suggestionsEl = document.getElementById("suggestions");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");

let answered = false;
let isTyping = false;

// ===== TYPEWRITER =====
function typewrite(el, html, speed = 40) {
    return new Promise(resolve => {
        // Parse the HTML to extract text and tags
        const text = "What do you want to know about Nick0?";
        let i = 0;
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        el.innerHTML = "";
        el.appendChild(cursor);

        function tick() {
            if (i < text.length) {
                const before = text.slice(0, i + 1);
                // Bold "Nick0"
                const display = before.replace("Nick0", "<strong>Nick0</strong>");
                el.innerHTML = display;
                el.appendChild(cursor);
                i++;
                setTimeout(tick, speed + Math.random() * 30);
            } else {
                resolve();
            }
        }
        setTimeout(tick, 600);
    });
}

// ===== RENDER SUGGESTIONS =====
function renderSuggestions(labels) {
    suggestionsEl.innerHTML = "";
    labels.forEach((label, i) => {
        const chip = document.createElement("button");
        chip.className = "chip";
        chip.textContent = label;
        chip.style.opacity = "0";
        chip.style.transform = "translateY(6px)";
        chip.style.transition = "all 0.25s ease";
        chip.onclick = () => handleInput(label);
        suggestionsEl.appendChild(chip);
        setTimeout(() => {
            chip.style.opacity = "1";
            chip.style.transform = "translateY(0)";
        }, 80 + i * 60);
    });
}

// ===== INITIAL SUGGESTIONS =====
const INITIAL_CHIPS = ["Who is Nick0?", "Tell me about 20n", "Show me all projects", "Contact"];

// ===== HANDLE INPUT =====
function handleInput(text) {
    if (isTyping || !text.trim()) return;
    isTyping = true;

    // Hide welcome
    if (!answered) {
        welcome.classList.add("hidden");
        answered = true;
    }

    // Clear input
    input.value = "";

    // Resolve the response ID
    const id = CHIP_MAP[text] || matchQuery(text);
    const data = RESPONSES[id] || RESPONSES["who"];

    // Clear suggestions
    suggestionsEl.innerHTML = "";

    // Show typing dots
    const dots = document.createElement("div");
    dots.className = "typing";
    dots.innerHTML = "<span></span><span></span><span></span>";
    responses.appendChild(dots);
    feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });

    // After delay, show response
    const delay = 600 + Math.random() * 400;
    setTimeout(() => {
        dots.remove();

        const block = document.createElement("div");
        block.className = "response-block";
        block.innerHTML = `<div class="user-query">${data.query}</div>${data.html}`;
        responses.appendChild(block);

        // Scroll to new response
        setTimeout(() => {
            feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });
        }, 50);

        // Show next suggestions
        setTimeout(() => {
            renderSuggestions(data.next || INITIAL_CHIPS);
            isTyping = false;
        }, 400);

    }, delay);
}

// ===== EVENTS =====
input.addEventListener("keydown", e => {
    if (e.key === "Enter") handleInput(input.value);
});
sendBtn.addEventListener("click", () => handleInput(input.value));

// ===== INIT =====
typewrite(typewriterEl).then(() => {
    renderSuggestions(INITIAL_CHIPS);
});
input.focus();
</script>
